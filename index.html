<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vertex Ultimate Control</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --accent: #ff0000;
            --text: #ffffff;
            --text-dim: #777;
            --success: #00ff88;
            --gold: #ffd700;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .page { display: none; padding: 20px 20px 100px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); border-radius: 16px; padding: 18px; margin-bottom: 15px; border: 1px solid #1f1f1f; }
        .section-title { font-size: 11px; text-transform: uppercase; color: var(--accent); letter-spacing: 2px; margin: 20px 0 10px; font-weight: 800; }

        /* Кнопки */
        .btn-action { width: 100%; background: var(--accent); color: #fff; border: none; padding: 16px; border-radius: 12px; font-weight: 800; text-transform: uppercase; margin-top: 10px; }
        .btn-secondary { width: 100%; background: #222; color: #fff; border: none; padding: 12px; border-radius: 10px; font-size: 12px; margin-top: 5px; }

        /* Лидерборд */
        .leader-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; }
        .rank-num { font-weight: 900; color: var(--accent); width: 30px; }
        
        /* Табы */
        nav { position: fixed; bottom: 0; width: 100%; background: rgba(10,10,10,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { color: var(--text-dim); font-size: 9px; text-align: center; font-weight: 800; }
        .nav-item.active { color: var(--accent); }
        .nav-item span { display: block; font-size: 18px; }

        /* Поля ввода */
        input, select { width: 100%; background: #000; border: 1px solid #222; padding: 12px; border-radius: 10px; color: #fff; margin-bottom: 10px; outline: none; }
    </style>
</head>
<body>
    <div id="p-shop" class="page active">
        <div class="section-title">Заказать Буст</div>
        <select id="b-type"><option>ММ (5x5)</option><option>Напарники (2x2)</option></select>
        <div style="display: flex; gap: 10px;">
            <select id="b-from"><option>Silver</option><option>Gold</option></select>
            <select id="b-to"><option>Gold</option><option>Legend</option></select>
        </div>
        <input type="number" id="b-id" placeholder="Ваш ID">
        <button class="btn-action" onclick="send('order')">Оформить Заказ</button>

        <div class="section-title">Активация промокода</div>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="promo-input" placeholder="Введите код...">
            <button style="background: var(--success); border: none; border-radius: 10px; padding: 0 15px;" onclick="send('promo')">✓</button>
        </div>
    </div>

    <div id="p-profile" class="page">
        <div class="card">
            <div style="color: var(--text-dim); font-size: 12px;">МОЙ БАЛАНС</div>
            <div style="font-size: 24px; font-weight: 900; color: var(--gold);" id="u-bal">0 G</div>
        </div>
        
        <div class="section-title">Таблица Лидеров (Топ XP)</div>
        <div class="card" id="leaderboard">
            <div class="leader-item"><span class="rank-num">1</span> <span>Zentrox</span> <span style="color:var(--success)">1540 XP</span></div>
            <div class="leader-item"><span class="rank-num">2</span> <span>Player_1</span> <span style="color:var(--success)">1200 XP</span></div>
        </div>

        <div class="section-title">Реферальная Программа</div>
        <div class="card" id="ref-link" style="font-size: 11px; color: var(--accent);">Загрузка...</div>
    </div>

    <div id="p-admin" class="page">
        <div id="admin-owner-tools">
            <div class="section-title">Управление (Владелец)</div>
            <button class="btn-secondary" onclick="adminOp('mailing')">📢 Сделать рассылку</button>
            <button class="btn-secondary" onclick="adminOp('add_promo')">🎟 Создать промокод</button>
        </div>

        <div class="section-title">Заказы в работе</div>
        <div id="orders-list">
            <div class="card">
                <div style="display:flex; justify-content: space-between;"><b>#5521</b> <span style="color:var(--success)">В Очереди</span></div>
                <div style="font-size: 12px; margin: 5px 0;">Gold -> Phoenix | ID: 12345</div>
                <button class="btn-action" style="padding: 8px; font-size: 12px;" onclick="adminOp('take_order')">ПРИНЯТЬ ЗАКАЗ</button>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-item active" onclick="nav('shop', this)"><span>🛒</span>Магазин</div>
        <div class="nav-item" onclick="nav('profile', this)"><span>🏆</span>Топ</div>
        <div class="nav-item" id="nav-adm" style="display:none;" onclick="nav('admin', this)"><span>👑</span>Админ</div>
    </nav>
    <script>
        const tg = window.Telegram.WebApp;
        const ADMIN_ID = 6477651244;
        const BUZTERS = [6477651244, 12345678]; // Список ID бустеров

        // Инициализация
        if (tg.initDataUnsafe?.user) {
            const uid = tg.initDataUnsafe.user.id;
            document.getElementById('ref-link').innerText = "t.me/VertexBot?start=" + uid;
            
            // Проверка прав (Владелец или Бустер)
            if (uid === ADMIN_ID || BUZTERS.includes(uid)) {
                document.getElementById('nav-adm').style.display = 'block';
            }
            // Скрываем инструменты владельца от обычных бустеров
            if (uid !== ADMIN_ID) {
                document.getElementById('admin-owner-tools').style.display = 'none';
            }
        }

        function nav(page, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p-' + page).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function send(action) {
            let data = { action: action };
            if(action === 'order') {
                data.type = document.getElementById('b-type').value;
                data.from = document.getElementById('b-from').value;
                data.to = document.getElementById('b-to').value;
                data.id = document.getElementById('b-id').value;
            } else if(action === 'promo') {
                data.code = document.getElementById('promo-input').value;
            }
            tg.sendData(JSON.stringify(data));
        }

        function adminOp(op) {
            tg.sendData(JSON.stringify({ action: 'admin', op: op }));
        }

        tg.expand();
        tg.ready();
    </script>
</body>
</html>
