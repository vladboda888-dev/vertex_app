<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vertex Boost Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #161616;
            --accent-red: #ff3c3c;
            --dark-red: #8b0000;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --success: #2ecc71;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(to right, var(--accent-red), #ff8e8e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .subtitle {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 5px;
        }

        .section-title {
            align-self: flex-start;
            font-size: 14px;
            font-weight: 600;
            color: var(--accent-red);
            margin: 20px 0 10px 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            width: 100%;
            max-width: 500px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .card:active {
            transform: scale(0.98);
        }

        .card.selected {
            border-color: var(--accent-red);
            background: #1a0a0a;
            box-shadow: 0 0 20px rgba(255, 60, 60, 0.15);
        }

        .card.selected::after {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: var(--accent-red);
        }

        .card-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .card-title {
            font-weight: 600;
            font-size: 15px;
        }

        .card-price {
            font-size: 13px;
            color: var(--success);
            font-weight: 600;
        }

        .input-group {
            width: 100%;
            max-width: 500px;
            margin-top: 25px;
        }

        input {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--accent-red);
        }

        #main-btn {
            width: 100%;
            max-width: 500px;
            background: var(--accent-red);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 18px;
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 60, 60, 0.3);
            transition: all 0.3s;
        }

        #main-btn:disabled {
            background: #333;
            color: #666;
            box-shadow: none;
            transform: none !important;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 500px;
        }

        .mode-card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            transition: 0.2s;
        }

        .mode-card.selected {
            background: var(--accent-red);
            border-color: var(--accent-red);
        }
    </style>
</head>
<body>

    <header>
        <p class="logo-text">Vertex Boost</p>
        <p class="subtitle">Элитный буст Standoff 2</p>
    </header>

    <div class="section-title">Выберите услугу</div>
    <div class="grid" id="services-list">
        </div>

    <div class="section-title">Режим игры</div>
    <div class="modes-grid" id="modes-list">
        </div>

    <div class="input-group">
        <div class="section-title">Ваш игровой ID</div>
        <input type="number" id="standoff-id" placeholder="Например: 12345678" inputmode="numeric">
    </div>

    <button id="main-btn" disabled>Оформить заказ</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#0d0d0d';
        tg.backgroundColor = '#0d0d0d';

        // Данные из твоего Python файла
        const services = [
            {id: 'S1', name: 'Silver to Gold', price: '45г / 20грн'},
            {id: 'S2', name: 'Gold to Phoenix', price: '60г / 25грн'},
            {id: 'S3', name: 'Phoenix to Ranger', price: '75г / 30грн'},
            {id: 'S4', name: 'Ranger to Champion', price: '85г / 35грн'},
            {id: 'S5', name: 'Champion to Master', price: '95г / 40грн'},
            {id: 'S6', name: 'Master to Elite', price: '120г / 45грн'},
            {id: 'S7', name: 'Elite to Legend', price: '190-235г / 85грн'},
            {id: 'SMULTI', name: 'Хочу 2+ звания', price: '0,7г - 1 ммр'}
        ];

        const modes = [
            {id: 'M1', name: 'ММ (5x5)'},
            {id: 'M2', name: 'Напарники'},
            {id: 'M3', name: 'Дуэли'}
        ];

        let selectedService = null;
        let selectedMode = 'M1';

        // Отрисовка услуг
        const servicesList = document.getElementById('services-list');
        services.forEach(s => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-info">
                    <span class="card-title">${s.name}</span>
                    <span class="card-price">${s.price}</span>
                </div>
            `;
            card.onclick = () => {
                tg.HapticFeedback.impactOccurred('light');
                document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedService = s.id;
                validate();
            };
            servicesList.appendChild(card);
        });

        // Отрисовка режимов
        const modesList = document.getElementById('modes-list');
        modes.forEach(m => {
            const mCard = document.createElement('div');
            mCard.className = 'mode-card' + (m.id === 'M1' ? ' selected' : '');
            mCard.innerText = m.name;
            mCard.onclick = () => {
                tg.HapticFeedback.selectionChanged();
                document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
                mCard.classList.add('selected');
                selectedMode = m.id;
            };
            modesList.appendChild(mCard);
        });

        const input = document.getElementById('standoff-id');
        const mainBtn = document.getElementById('main-btn');

        function validate() {
            mainBtn.disabled = !(selectedService && input.value.length > 4);
        }

        input.oninput = validate;

        mainBtn.onclick = () => {
            const data = {
                service_id: selectedService,
                standoff_id: input.value,
                mode_id: selectedMode
            };
            tg.HapticFeedback.notificationOccurred('success');
            tg.sendData(JSON.stringify(data));
        };
    </script>
</body>
</html>
