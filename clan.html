<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Divo eSports Space Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        /* ================= КОСМИЧЕСКИЙ ДИЗАЙН ================= */
        :root {
            --space-dark: #020108;
            --nebula-purple: rgba(94, 23, 235, 0.4);
            --nebula-blue: rgba(0, 212, 255, 0.3);
            --gold-divo: #E5C05C;
            --glass-bg: rgba(15, 15, 25, 0.55);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #FFFFFF;
            --text-muted: #8A8A93;
            --color-prak: #00FF88;
            --color-tour: #00F3FF;
            --color-weekend: #FF4A4A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--space-dark);
            /* Анимированный космический фон */
            background-image: 
                radial-gradient(circle at 20% 30%, var(--nebula-purple) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, var(--nebula-blue) 0%, transparent 40%),
                url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="10" r="1" fill="rgba(255,255,255,0.3)"/><circle cx="60" cy="40" r="1.5" fill="rgba(255,255,255,0.4)"/><circle cx="30" cy="80" r="0.8" fill="rgba(255,255,255,0.2)"/></svg>');
            background-attachment: fixed;
            color: var(--text-main);
            overflow-x: hidden;
            padding-bottom: 100px;
        }

        ::-webkit-scrollbar { display: none; }

        /* --- Шапка --- */
        .header {
            padding: 20px 20px 15px;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(180deg, rgba(2,1,8,0.9) 0%, transparent 100%);
            position: sticky; top: 0; z-index: 50; backdrop-filter: blur(8px);
        }

        .logo {
            font-size: 26px; font-weight: 900; letter-spacing: 2px;
            background: linear-gradient(135deg, #FFF, var(--gold-divo));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(229, 192, 92, 0.4);
        }

        .role-badge {
            font-size: 10px; font-weight: 800; padding: 6px 12px; border-radius: 8px;
            background: rgba(229, 192, 92, 0.1); border: 1px solid rgba(229, 192, 92, 0.3);
            color: var(--gold-divo); text-transform: uppercase;
            box-shadow: 0 0 15px rgba(229, 192, 92, 0.15);
        }

        .container { padding: 0 15px; }

        h2 {
            font-size: 16px; font-weight: 800; margin: 25px 0 15px;
            color: var(--text-main); text-transform: uppercase; letter-spacing: 1.5px;
            display: flex; align-items: center; gap: 10px;
        }
        h2::before {
            content: ''; display: block; width: 4px; height: 16px;
            background: var(--gold-divo); border-radius: 2px; box-shadow: 0 0 10px var(--gold-divo);
        }

        /* --- Glass Cards --- */
        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 16px; padding: 18px; margin-bottom: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6); position: relative; overflow: hidden;
        }

        /* ================= КАЛЕНДАРЬ НА МЕСЯЦ (КАК НА ФОТО) ================= */
        .month-title { text-align: center; font-size: 20px; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-header { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; }
        .cal-header.weekend { color: var(--color-weekend); }
        
        .cal-day-box {
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            height: 45px; position: relative; padding-top: 5px; cursor: pointer;
        }
        .cal-num { font-size: 16px; font-weight: 800; z-index: 2; transition: 0.2s; }
        .cal-day-box.weekend .cal-num { color: var(--color-weekend); }
        .cal-day-box.dimmed .cal-num { color: #444; }
        
        /* Выделение выбранного дня (рамка как на скрине) */
        .cal-day-box.selected::before {
            content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 32px; height: 38px; border: 1px solid rgba(255,255,255,0.4);
            border-radius: 8px; background: rgba(255,255,255,0.05); z-index: 1;
        }

        /* Индикаторы событий под числом */
        .indicator-container { display: flex; gap: 2px; margin-top: 5px; z-index: 2;}
        .cal-line { width: 12px; height: 3px; border-radius: 2px; }
        .line-prak { background: var(--color-prak); box-shadow: 0 0 5px var(--color-prak); }
        .line-tour { background: var(--color-tour); box-shadow: 0 0 5px var(--color-tour); }

        /* ================= КАРТОЧКИ СОБЫТИЙ ================= */
        .empty-state { text-align: center; padding: 30px 10px; color: var(--text-muted); font-size: 13px; font-weight: 600; border: 1px dashed rgba(255,255,255,0.1); border-radius: 12px; }
        
        .event-title { font-size: 18px; font-weight: 900; margin-bottom: 5px; color: #FFF; text-shadow: 0 0 10px rgba(255,255,255,0.2);}
        .event-time { font-size: 12px; color: var(--gold-divo); margin-bottom: 15px; font-weight: 600; letter-spacing: 0.5px;}
        
        .btn-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn {
            flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 800;
            font-size: 12px; text-transform: uppercase; cursor: pointer; transition: 0.2s; color: #FFF;
        }
        .btn-green { background: rgba(0, 255, 136, 0.15); border: 1px solid rgba(0, 255, 136, 0.4); color: var(--color-prak); }
        .btn-red { background: rgba(255, 74, 74, 0.15); border: 1px solid rgba(255, 74, 74, 0.4); color: var(--color-weekend); }
        .btn-gold { background: linear-gradient(45deg, #B59544, #E5C05C); color: #000; box-shadow: 0 0 15px rgba(229, 192, 92, 0.4); width: 100%; margin-bottom: 10px;}
        .btn-dark { background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); width: 100%; color: var(--text-main); }
        .btn:active { transform: scale(0.95); }

        .roster-box { background: rgba(0,0,0,0.4); border-radius: 10px; padding: 12px; border: 1px inset rgba(255,255,255,0.02); }
        .roster-title { font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; font-weight: 800;}
        .roster-item { font-size: 12px; display: flex; justify-content: space-between; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px dashed rgba(255,255,255,0.05);}
        .roster-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0;}

        /* ================= ТАКТИЧЕСКАЯ ДОСКА (С ЗУМОМ) ================= */
        .board-controls { display: flex; gap: 10px; margin-bottom: 10px; }
        .map-select { flex: 2; padding: 12px; background: rgba(0,0,0,0.6); color: var(--text-main); border: 1px solid var(--glass-border); border-radius: 10px; outline: none; font-weight: 800; }
        .zoom-btn { flex: 1; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: #FFF; border-radius: 10px; font-weight: bold; font-size: 18px;}
        
        .canvas-container {
            width: 100%; height: 350px; background-color: #050508; border-radius: 12px;
            border: 1px solid var(--glass-border); overflow: hidden; /* Важно для зума */
            position: relative; touch-action: none; /* Блокируем скролл страницы */
        }
        
        /* Холст, который мы будем масштабировать и двигать */
        #tactic-canvas {
            transform-origin: 0 0;
            background-size: contain; 
            background-position: center;
            background-repeat: no-repeat;
        }

        .color-picker { display: flex; justify-content: center; gap: 15px; padding: 15px 0; }
        .color-dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid transparent; transition: 0.2s; }
        .color-dot.active { border-color: #FFF; transform: scale(1.3); box-shadow: 0 0 12px currentColor; }

        /* --- Ввод (Формы) --- */
        .input-dark { width: 100%; padding: 14px; background: rgba(0,0,0,0.5); border: 1px solid var(--glass-border); color: #FFF; border-radius: 10px; margin-bottom: 10px; font-size: 14px; font-weight: 600; outline: none;}

        /* ================= НАВИГАЦИЯ ================= */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: rgba(2, 1, 8, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border); display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .nav-item { background: none; border: none; color: var(--text-muted); font-size: 9px; font-weight: 800; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 6px; transition: 0.3s; }
        .nav-icon { font-size: 22px; opacity: 0.4; transition: 0.3s; filter: grayscale(100%);}
        .nav-item.active { color: var(--gold-divo); }
        .nav-item.active .nav-icon { opacity: 1; filter: grayscale(0%); text-shadow: 0 0 15px var(--gold-divo); transform: translateY(-3px); }

        .tab-content { display: none; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">DIVO</div>
        <div class="role-badge" id="ui-role">Загрузка...</div>
    </header>

    <div class="container">
        
        <!-- === ВКЛАДКА: КАЛЕНДАРЬ === -->
        <div id="tab-calendar" class="tab-content active">
            <div class="month-title">ИЮНЬ 2026</div>
            <div class="glass-card" style="padding: 15px 10px;">
                <div class="cal-grid">
                    <div class="cal-header">ПН</div><div class="cal-header">ВТ</div><div class="cal-header">СР</div>
                    <div class="cal-header">ЧТ</div><div class="cal-header">ПТ</div><div class="cal-header weekend">СБ</div><div class="cal-header weekend">ВС</div>
                </div>
                <div class="cal-grid" id="calendar-body">
                    <!-- Генерируется JS -->
                </div>
            </div>

            <h2 id="selected-date-title">События на сегодня</h2>
            <div id="daily-events-container">
                <!-- Карточки выбранного дня -->
            </div>
        </div>

        <!-- === ВКЛАДКА: МАТЧИ (ВСЕ) === -->
        <div id="tab-matches" class="tab-content">
            <h2>Все запланированные матчи</h2>
            <div id="all-matches-container">
                <!-- Генерируется JS -->
            </div>
        </div>

        <!-- === ВКЛАДКА: ДОСКА (С ЗУМОМ) === -->
        <div id="tab-board" class="tab-content">
            <h2>Тактика (Мультитач)</h2>
            <div class="glass-card" style="padding: 15px;">
                <div class="board-controls">
                    <select class="map-select" id="map-select" onchange="changeMap()">
                        <option value="none" disabled selected>-- Карта --</option>
                        <option value="sandstone.png">Sandstone</option>
                        <option value="province.png">Province</option>
                        <option value="rust.png">Rust</option>
                    </select>
                    <button class="zoom-btn" onclick="zoomBoard(0.2)">+</button>
                    <button class="zoom-btn" onclick="zoomBoard(-0.2)">-</button>
                </div>
                
                <div class="canvas-container" id="canvas-wrapper">
                    <canvas id="tactic-canvas" width="800" height="600"></canvas>
                </div>
                
                <div class="color-picker">
                    <div class="color-dot active" style="background: #00F3FF; color: #00F3FF;" onclick="setColor(this, '#00F3FF')"></div>
                    <div class="color-dot" style="background: #00FF88; color: #00FF88;" onclick="setColor(this, '#00FF88')"></div>
                    <div class="color-dot" style="background: #E5C05C; color: #E5C05C;" onclick="setColor(this, '#E5C05C')"></div>
                    <div class="color-dot" style="background: #FF2A55; color: #FF2A55;" onclick="setColor(this, '#FF2A55')"></div>
                    <div class="color-dot" style="background: #FFFFFF; color: #FFFFFF;" onclick="setColor(this, '#FFFFFF')"></div>
                </div>
                <button class="btn btn-dark" onclick="clearBoard()">Очистить рисунок</button>
            </div>
        </div>

        <!-- === ВКЛАДКА: АДМИНКА === -->
        <div id="tab-admin" class="tab-content">
            <h2 style="color: var(--gold-divo);">Управление кланом</h2>
            <div class="glass-card">
                <h3 style="font-size: 14px; margin-bottom: 15px;">Создать матч</h3>
                <input type="date" id="new-event-date" class="input-dark">
                <select id="new-event-type" class="input-dark">
                    <option value="prak">Прак (Тренировка)</option>
                    <option value="tour">Турнир</option>
                </select>
                <input type="text" id="new-event-title" class="input-dark" placeholder="Название (например: vs Horizon)">
                <input type="text" id="new-event-time" class="input-dark" placeholder="Время и Карта (20:00 - Sandstone)">
                
                <button class="btn btn-gold" onclick="createEvent()">Опубликовать матч</button>
            </div>
        </div>

    </div>

    <!-- === НАВИГАЦИЯ === -->
    <nav class="bottom-nav" id="main-nav">
        <button class="nav-item active" onclick="openTab('tab-calendar', this)">
            <span class="nav-icon">📅</span><span>График</span>
        </button>
        <button class="nav-item" onclick="openTab('tab-matches', this)">
            <span class="nav-icon">⚔️</span><span>Матчи</span>
        </button>
        <button class="nav-item" onclick="openTab('tab-board', this)">
            <span class="nav-icon">🗺️</span><span>Доска</span>
        </button>
        <button class="nav-item admin-only" style="display: none;" onclick="openTab('tab-admin', this)">
            <span class="nav-icon">⚙️</span><span>Кэп</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const urlParams = new URLSearchParams(window.location.search);
        let userRole = urlParams.get('role') || 'creator'; // Для теста стоит создатель
        const currentUser = tg.initDataUnsafe?.user || { username: "AdminTest", id: 7777777 };
        const usernameDisplay = currentUser.username ? `@${currentUser.username}` : "Player";

        /* === БАЗА ДАННЫХ СОБЫТИЙ (Изначально пустая) === */
        let eventsData = []; 
        let attendanceData = {}; // Формат: { eventId: [{id, name}] }

        let currentSelectedDate = 12; // Июнь 2026, сегодня типа 12-е

        /* === ИНИЦИАЛИЗАЦИЯ === */
        function initApp() {
            const uiRole = document.getElementById('ui-role');
            if (userRole === 'guest') {
                uiRole.innerText = 'ГОСТЬ';
                document.querySelector('.container').innerHTML = `<div class="empty-state" style="margin-top:50px;">ДОСТУП ЗАКРЫТ<br>Ожидайте принятия в клан.</div>`;
                document.getElementById('main-nav').style.display = 'none';
                return;
            }
            if (userRole === 'player') uiRole.innerText = 'ИГРОК';
            if (userRole === 'captain' || userRole === 'creator') {
                uiRole.innerText = userRole === 'creator' ? 'СОЗДАТЕЛЬ' : 'КАПИТАН';
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'flex');
            }
            // Выставляем дефолтную дату в инпут
            document.getElementById('new-event-date').value = '2026-06-12';
            renderCalendar();
            renderMatches();
        }

        function openTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if (btn) {
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                btn.classList.add('active');
                tg.HapticFeedback.selectionChanged();
            }
        }

        /* === ГЕНЕРАЦИЯ КАЛЕНДАРЯ === */
        function renderCalendar() {
            const calBody = document.getElementById('calendar-body');
            calBody.innerHTML = '';
            
            // Имитация Июня 2026 (начинается с понедельника)
            let daysInMonth = 30;
            for(let i = 1; i <= daysInMonth; i++) {
                const isWeekend = (i % 7 === 6 || i % 7 === 0);
                const isSelected = (i === currentSelectedDate) ? 'selected' : '';
                const weekendClass = isWeekend ? 'weekend' : '';
                
                // Ищем события на этот день
                let dayEvents = eventsData.filter(e => {
                    let d = new Date(e.date);
                    return d.getDate() === i;
                });

                let indicatorsHtml = '';
                if (dayEvents.length > 0) {
                    dayEvents.forEach(e => {
                        let colorClass = e.type === 'prak' ? 'line-prak' : 'line-tour';
                        indicatorsHtml += `<div class="cal-line ${colorClass}"></div>`;
                    });
                }

                calBody.innerHTML += `
                    <div class="cal-day-box ${weekendClass} ${isSelected}" onclick="selectDate(${i})">
                        <span class="cal-num">${i}</span>
                        <div class="indicator-container">${indicatorsHtml}</div>
                    </div>
                `;
            }
            renderDailyEvents();
        }

        function selectDate(day) {
            tg.HapticFeedback.selectionChanged();
            currentSelectedDate = day;
            renderCalendar(); // Перерисовка для рамки
        }

        /* === СОЗДАНИЕ СОБЫТИЯ (АДМИНКА) === */
        function createEvent() {
            const date = document.getElementById('new-event-date').value;
            const type = document.getElementById('new-event-type').value;
            const title = document.getElementById('new-event-title').value;
            const timeMap = document.getElementById('new-event-time').value;

            if(!date || !title) { tg.showAlert('Заполните дату и название!'); return; }

            const newEvent = {
                id: Date.now(),
                date: date,
                type: type,
                title: title,
                timeMap: timeMap || 'Время уточняется'
            };

            eventsData.push(newEvent);
            attendanceData[newEvent.id] = []; // Пустой состав
            
            tg.HapticFeedback.impactOccurred('heavy');
            tg.showAlert('Матч успешно создан!');
            
            // Обновляем UI
            renderCalendar();
            renderMatches();
            
            // Отправляем боту
            tg.sendData(JSON.stringify({ action: 'create_event', title: title }));
            
            // Очищаем форму
            document.getElementById('new-event-title').value = '';
            document.getElementById('new-event-time').value = '';
        }

        /* === РЕНДЕР КАРТОЧЕК МАТЧЕЙ === */
        function renderDailyEvents() {
            const container = document.getElementById('daily-events-container');
            let dayEvents = eventsData.filter(e => {
                let d = new Date(e.date);
                return d.getDate() === currentSelectedDate;
            });
            container.innerHTML = generateCardsHtml(dayEvents, "В этот день нет запланированных игр.");
        }

        function renderMatches() {
            const container = document.getElementById('all-matches-container');
            // Сортировка по дате (опционально)
            container.innerHTML = generateCardsHtml(eventsData, "Список матчей пока пуст. Создатель еще не добавил расписание.");
        }

        function generateCardsHtml(eventsArr, emptyText) {
            if (eventsArr.length === 0) return `<div class="empty-state">${emptyText}</div>`;
            
            let html = '';
            eventsArr.forEach(evt => {
                let isAttending = attendanceData[evt.id].some(u => u.id === currentUser.id);
                
                let rosterHtml = '';
                if(attendanceData[evt.id].length === 0) {
                    rosterHtml = `<div class="roster-item" style="color:var(--text-muted); border:none;">Пока никто не записался</div>`;
                } else {
                    attendanceData[evt.id].forEach(u => {
                        rosterHtml += `<div class="roster-item"><span class="r-name">${u.name}</span><span class="r-id">ID: ${u.id}</span></div>`;
                    });
                }

                let badgeColor = evt.type === 'prak' ? 'var(--color-prak)' : 'var(--color-tour)';
                let typeName = evt.type === 'prak' ? 'ПРАК' : 'ТУРНИР';

                html += `
                    <div class="glass-card">
                        <div style="font-size:10px; color:${badgeColor}; font-weight:900; margin-bottom:5px;">${typeName}</div>
                        <div class="event-title">${evt.title}</div>
                        <div class="event-time">${evt.date} | ${evt.timeMap}</div>
                        
                        <div class="btn-row">
                            <button class="btn btn-green" onclick="attend(${evt.id}, true)" ${isAttending?'style="box-shadow:0 0 10px var(--color-prak)"':''}>Я буду</button>
                            <button class="btn btn-red" onclick="attend(${evt.id}, false)">Пропуск</button>
                        </div>

                        <div class="roster-box">
                            <div class="roster-title">Состав (${attendanceData[evt.id].length})</div>
                            ${rosterHtml}
                        </div>
                    </div>
                `;
            });
            return html;
        }

        /* === ОТМЕТКИ НА МАТЧ === */
        function attend(eventId, status) {
            tg.HapticFeedback.impactOccurred('medium');
            let roster = attendanceData[eventId];
            let index = roster.findIndex(u => u.id === currentUser.id);

            if (status) {
                if (index === -1) roster.push({ id: currentUser.id, name: usernameDisplay });
            } else {
                if (index > -1) roster.splice(index, 1);
            }

            // Перерисовываем обе вкладки, чтобы данные обновились
            renderDailyEvents();
            renderMatches();

            tg.sendData(JSON.stringify({ action: 'attend', eventId: eventId, status: status }));
        }

        /* ================= ДОСКА С ЗУМОМ И РИСОВАНИЕМ ================= */
        const canvasWrapper = document.getElementById('canvas-wrapper');
        const canvas = document.getElementById('tactic-canvas');
        const ctx = canvas.getContext('2d');
        
        let isDrawing = false;
        let drawColor = '#00F3FF';
        
        // Переменные для зума и панорамирования
        let scale = 1;
        let panX = 0; let panY = 0;
        let isPanning = false;
        let startPanX = 0; let startPanY = 0;

        function changeMap() {
            const mapFile = document.getElementById('map-select').value;
            if(mapFile !== 'none') {
                canvas.style.backgroundImage = `url('${mapFile}')`;
            }
            clearBoard();
        }

        function setColor(el, color) {
            drawColor = color;
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        }

        // Обновление CSS трансформации
        function updateTransform() {
            canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
        }

        // Кнопки ЗУМА (+ / -)
        function zoomBoard(delta) {
            tg.HapticFeedback.selectionChanged();
            scale += delta;
            if(scale < 0.5) scale = 0.5;
            if(scale > 4) scale = 4;
            updateTransform();
        }

        function getMapPos(clientX, clientY) {
            const rect = canvasWrapper.getBoundingClientRect();
            // Вычисляем координаты относительно масштаба и сдвига
            const x = (clientX - rect.left - panX) / scale;
            const y = (clientY - rect.top - panY) / scale;
            return { x, y };
        }

        /* Обработка касаний (Универсальная Рисовалка + Панорама) */
        canvasWrapper.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(e.touches.length === 2) {
                // Если 2 пальца - двигаем холст (панорамирование)
                isPanning = true;
                startPanX = e.touches[0].clientX - panX;
                startPanY = e.touches[0].clientY - panY;
            } else if(e.touches.length === 1) {
                // Если 1 палец - рисуем
                isDrawing = true;
                const pos = getMapPos(e.touches[0].clientX, e.touches[0].clientY);
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
            }
        });

        canvasWrapper.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if(isPanning && e.touches.length === 2) {
                panX = e.touches[0].clientX - startPanX;
                panY = e.touches[0].clientY - startPanY;
                updateTransform();
            } else if(isDrawing && e.touches.length === 1) {
                const pos = getMapPos(e.touches[0].clientX, e.touches[0].clientY);
                ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                ctx.strokeStyle = drawColor; ctx.shadowBlur = 5; ctx.shadowColor = drawColor;
                ctx.lineTo(pos.x, pos.y); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
            }
        });

        canvasWrapper.addEventListener('touchend', () => {
            isDrawing = false; isPanning = false; ctx.beginPath();
        });

        /* Для ПК (Мышка) */
        canvasWrapper.addEventListener('mousedown', (e) => {
            isDrawing = true; const pos = getMapPos(e.clientX, e.clientY);
            ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
        });
        canvasWrapper.addEventListener('mousemove', (e) => {
            if(!isDrawing) return;
            const pos = getMapPos(e.clientX, e.clientY);
            ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.strokeStyle = drawColor; ctx.shadowBlur = 5; ctx.shadowColor = drawColor;
            ctx.lineTo(pos.x, pos.y); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
        });
        canvasWrapper.addEventListener('mouseup', () => { isDrawing = false; ctx.beginPath(); });
        canvasWrapper.addEventListener('mouseleave', () => { isDrawing = false; });

        function clearBoard() {
            tg.HapticFeedback.impactOccurred('rigid');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Сброс зума при очистке
            scale = 1; panX = 0; panY = 0; updateTransform();
        }

        initApp();
    </script>
</body>
</html>
