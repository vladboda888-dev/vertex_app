<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Divo eSports Cosmic</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        /* ================= КОСМИЧЕСКИЙ ДИЗАЙН ================= */
        :root {
            --space-dark: #03010b;
            --nebula-purple: rgba(138, 43, 226, 0.25);
            --nebula-blue: rgba(0, 195, 255, 0.2);
            --gold-divo: #E5C05C;
            --glass-bg: rgba(10, 10, 20, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #FFFFFF;
            --text-muted: #8A8A93;
            --color-prak: #00FF88;
            --color-tour: #00F3FF;
            --color-weekend: #FF4A4A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--space-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, var(--nebula-purple) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, var(--nebula-blue) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(229, 192, 92, 0.05) 0%, transparent 60%);
            background-attachment: fixed;
            color: var(--text-main);
            overflow-x: hidden;
            padding-bottom: 100px;
        }

        /* Звезды на фоне */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: radial-gradient(rgba(255,255,255,0.8) 1px, transparent 1px);
            background-size: 40px 40px; opacity: 0.15; z-index: -1; pointer-events: none;
        }

        ::-webkit-scrollbar { display: none; }

        /* --- Шапка --- */
        .header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(180deg, rgba(3,1,11,0.9) 0%, transparent 100%);
            position: sticky; top: 0; z-index: 50; backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 26px; font-weight: 900; letter-spacing: 2px;
            background: linear-gradient(135deg, #FFF, var(--gold-divo));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(229, 192, 92, 0.5);
        }

        .role-badge {
            font-size: 10px; font-weight: 800; padding: 6px 12px; border-radius: 8px;
            background: rgba(229, 192, 92, 0.1); border: 1px solid rgba(229, 192, 92, 0.4);
            color: var(--gold-divo); text-transform: uppercase;
            box-shadow: 0 0 15px rgba(229, 192, 92, 0.2);
        }

        .container { padding: 0 15px; }

        h2 {
            font-size: 16px; font-weight: 800; margin: 25px 0 15px;
            color: var(--text-main); text-transform: uppercase; letter-spacing: 1.5px;
            display: flex; align-items: center; gap: 10px; text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }
        h2::before {
            content: ''; display: block; width: 4px; height: 16px;
            background: var(--gold-divo); border-radius: 2px; box-shadow: 0 0 10px var(--gold-divo);
        }

        /* --- Карточки (Glassmorphism) --- */
        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 16px; padding: 18px; margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7), inset 0 0 15px rgba(255,255,255,0.02);
        }

        /* --- Календарь --- */
        .month-title { text-align: center; font-size: 20px; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 2px; color: var(--gold-divo); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
        .cal-header { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; }
        .cal-header.weekend { color: var(--color-weekend); }
        
        .cal-day-box { display: flex; flex-direction: column; align-items: center; height: 45px; position: relative; padding-top: 5px; cursor: pointer; }
        .cal-num { font-size: 16px; font-weight: 800; z-index: 2; transition: 0.2s; }
        .cal-day-box.weekend .cal-num { color: var(--color-weekend); }
        
        .cal-day-box.selected::before {
            content: ''; position: absolute; top: -2px; left: 50%; transform: translateX(-50%);
            width: 34px; height: 42px; border: 1.5px solid rgba(255,255,255,0.6);
            border-radius: 8px; background: rgba(255,255,255,0.1); z-index: 1; box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .indicator-container { display: flex; gap: 3px; margin-top: 5px; z-index: 2;}
        .cal-line { width: 6px; height: 6px; border-radius: 50%; } /* Сделал точками для красоты */
        .line-prak { background: var(--color-prak); box-shadow: 0 0 8px var(--color-prak); }
        .line-tour { background: var(--color-tour); box-shadow: 0 0 8px var(--color-tour); }

        /* --- Карточки Событий --- */
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; font-weight: 600; border: 1px dashed rgba(255,255,255,0.1); border-radius: 12px; background: rgba(0,0,0,0.3);}
        
        .event-title { font-size: 18px; font-weight: 900; margin-bottom: 5px; color: #FFF; text-shadow: 0 0 15px rgba(255,255,255,0.3);}
        .event-time { font-size: 12px; color: var(--gold-divo); margin-bottom: 15px; font-weight: 600; letter-spacing: 0.5px;}
        
        .btn-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn {
            flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: 800;
            font-size: 12px; text-transform: uppercase; cursor: pointer; transition: 0.2s; color: #FFF; letter-spacing: 1px;
        }
        .btn-green { background: rgba(0, 255, 136, 0.15); border: 1px solid rgba(0, 255, 136, 0.5); color: var(--color-prak); }
        .btn-red { background: rgba(255, 74, 74, 0.15); border: 1px solid rgba(255, 74, 74, 0.5); color: var(--color-weekend); }
        .btn-gold { background: linear-gradient(45deg, #B59544, #E5C05C); color: #000; box-shadow: 0 0 20px rgba(229, 192, 92, 0.4); width: 100%; margin-bottom: 10px;}
        .btn-dark { background: rgba(0,0,0,0.6); border: 1px solid var(--glass-border); width: 100%; color: var(--text-main); }
        .btn:active { transform: scale(0.95); }

        .roster-box { background: rgba(0,0,0,0.5); border-radius: 10px; padding: 12px; border: 1px inset rgba(255,255,255,0.05); }
        .roster-item { font-size: 12px; display: flex; justify-content: space-between; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px dashed rgba(255,255,255,0.1);}
        .roster-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0;}
        .r-name { color: #FFF; font-weight: 800; }

        /* --- Тактическая доска --- */
        .board-controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .map-select { flex: 1; min-width: 120px; padding: 12px; background: rgba(0,0,0,0.7); color: var(--gold-divo); border: 1px solid var(--glass-border); border-radius: 10px; outline: none; font-weight: 800; text-transform: uppercase;}
        
        .mode-toggle { display: flex; width: 100%; background: rgba(0,0,0,0.5); border-radius: 10px; padding: 4px; border: 1px solid var(--glass-border);}
        .mode-btn { flex: 1; padding: 10px; text-align: center; font-weight: 800; font-size: 12px; color: var(--text-muted); border-radius: 8px; transition: 0.3s; cursor: pointer; text-transform: uppercase;}
        .mode-btn.active { background: var(--gold-divo); color: #000; box-shadow: 0 0 10px rgba(229, 192, 92, 0.5); }

        .zoom-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: #FFF; border-radius: 10px; font-weight: bold; font-size: 18px; padding: 0 15px; cursor: pointer;}
        
        .canvas-container {
            width: 100%; height: 350px; background-color: #020108; border-radius: 12px;
            border: 1px solid var(--glass-border); overflow: hidden; position: relative; touch-action: none;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.9);
        }
        
        #tactic-canvas { transform-origin: 0 0; background-size: contain; background-position: center; background-repeat: no-repeat; }

        .color-picker { display: flex; justify-content: space-around; padding: 15px 0; background: rgba(0,0,0,0.3); border-radius: 12px; margin-bottom: 15px;}
        .color-dot { width: 24px; height: 24px; border-radius: 50%; border: 2px solid transparent; transition: 0.2s; cursor: pointer;}
        .color-dot.active { border-color: #FFF; transform: scale(1.3); box-shadow: 0 0 15px currentColor; }

        /* --- Ввод / Админка / Казна --- */
        .input-dark { width: 100%; padding: 14px; background: rgba(0,0,0,0.6); border: 1px solid var(--glass-border); color: #FFF; border-radius: 10px; margin-bottom: 12px; font-size: 14px; font-weight: 600; outline: none; transition: 0.3s;}
        .input-dark:focus { border-color: var(--gold-divo); box-shadow: 0 0 10px rgba(229, 192, 92, 0.2); }

        .balance-sum { font-size: 42px; font-weight: 900; color: var(--gold-divo); text-align: center; text-shadow: 0 0 30px rgba(229, 192, 92, 0.5); margin: 20px 0; }

        /* --- Навигация --- */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: rgba(3, 1, 11, 0.95); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid var(--glass-border); display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .nav-item { background: none; border: none; color: var(--text-muted); font-size: 9px; font-weight: 800; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: 0.3s; cursor: pointer;}
        .nav-icon { font-size: 22px; opacity: 0.5; transition: 0.3s; filter: grayscale(100%);}
        .nav-item.active { color: var(--gold-divo); }
        .nav-item.active .nav-icon { opacity: 1; filter: grayscale(0%); text-shadow: 0 0 20px var(--gold-divo); transform: translateY(-4px); }

        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">DIVO</div>
        <div class="role-badge" id="ui-role">Загрузка...</div>
    </header>

    <div class="container">
        
        <!-- === КАЛЕНДАРЬ === -->
        <div id="tab-calendar" class="tab-content active">
            <div class="month-title">ИЮНЬ 2026</div>
            <div class="glass-card" style="padding: 15px 10px;">
                <div class="cal-grid">
                    <div class="cal-header">ПН</div><div class="cal-header">ВТ</div><div class="cal-header">СР</div>
                    <div class="cal-header">ЧТ</div><div class="cal-header">ПТ</div><div class="cal-header weekend">СБ</div><div class="cal-header weekend">ВС</div>
                </div>
                <div class="cal-grid" id="calendar-body"></div>
            </div>

            <h2 id="selected-date-title">События на сегодня</h2>
            <div id="daily-events-container"></div>
        </div>

        <!-- === ВСЕ МАТЧИ === -->
        <div id="tab-matches" class="tab-content">
            <h2>Все матчи клана</h2>
            <div id="all-matches-container"></div>
        </div>

        <!-- === ДОСКА === -->
        <div id="tab-board" class="tab-content">
            <h2>Тактическая доска</h2>
            <div class="glass-card" style="padding: 15px;">
                <div class="board-controls">
                    <!-- Все 7 карт -->
                    <select class="map-select" id="map-select" onchange="changeMap()">
                        <option value="none" disabled selected>-- Выбор Карты --</option>
                        <option value="sandstone.png">Sandstone</option>
                        <option value="province.png">Province</option>
                        <option value="rust.png">Rust</option>
                        <option value="sakura.png">Sakura</option>
                        <option value="zone9.png">Zone 9</option>
                        <option value="breeze.png">Breeze</option>
                        <option value="dune.png">Dune</option>
                    </select>
                    <button class="zoom-btn" onclick="zoomBoard(0.2)">+</button>
                    <button class="zoom-btn" onclick="zoomBoard(-0.2)">-</button>
                    
                    <!-- Переключатель скролла и рисования -->
                    <div class="mode-toggle">
                        <div class="mode-btn active" id="btn-draw" onclick="setBoardMode('draw')">🖌 Рисовать</div>
                        <div class="mode-btn" id="btn-move" onclick="setBoardMode('move')">✋ Двигать</div>
                    </div>
                </div>
                
                <div class="canvas-container" id="canvas-wrapper">
                    <canvas id="tactic-canvas" width="800" height="600"></canvas>
                </div>
                
                <div class="color-picker">
                    <div class="color-dot active" style="background: #00F3FF;" onclick="setColor(this, '#00F3FF')"></div>
                    <div class="color-dot" style="background: #00FF88;" onclick="setColor(this, '#00FF88')"></div>
                    <div class="color-dot" style="background: #E5C05C;" onclick="setColor(this, '#E5C05C')"></div>
                    <div class="color-dot" style="background: #FF2A55;" onclick="setColor(this, '#FF2A55')"></div>
                    <div class="color-dot" style="background: #FFFFFF;" onclick="setColor(this, '#FFFFFF')"></div>
                </div>
                <button class="btn btn-dark" onclick="clearBoard()">Очистить доску</button>
            </div>
        </div>

        <!-- === КАЗНА === -->
        <div id="tab-finance" class="tab-content">
            <h2>Казна клана</h2>
            <div class="glass-card">
                <div style="font-size: 10px; color: var(--text-muted); text-align: center; text-transform: uppercase;">Общий бюджет</div>
                <div class="balance-sum" id="total-balance">0 ₽</div>
            </div>
            <h2>История</h2>
            <div id="finance-history">
                <div class="empty-state">История пуста. Капитан еще не вносил данные.</div>
            </div>
        </div>

        <!-- === АДМИНКА === -->
        <div id="tab-admin" class="tab-content">
            <h2 style="color: var(--gold-divo);">Панель Капитана</h2>
            
            <div class="glass-card">
                <h3 style="font-size: 14px; margin-bottom: 15px;">Создать матч</h3>
                <input type="date" id="new-event-date" class="input-dark">
                <select id="new-event-type" class="input-dark">
                    <option value="prak">Прак (Тренировка)</option>
                    <option value="tour">Турнир</option>
                </select>
                <input type="text" id="new-event-title" class="input-dark" placeholder="Название (например: vs Horizon)">
                <input type="text" id="new-event-time" class="input-dark" placeholder="Время и Карта (20:00 - Sandstone)">
                <button class="btn btn-gold" onclick="createEvent()">Опубликовать матч</button>
            </div>

            <div class="glass-card">
                <h3 style="font-size: 14px; margin-bottom: 15px;">Управление казной</h3>
                <input type="number" id="fin-amount" class="input-dark" placeholder="Сумма (₽)">
                <input type="text" id="fin-desc" class="input-dark" placeholder="Описание (Призовые, дизайн и т.д.)">
                <select id="fin-type" class="input-dark">
                    <option value="income">Доход (+)</option>
                    <option value="expense">Расход (-)</option>
                </select>
                <button class="btn btn-green" style="width: 100%; border: none;" onclick="addFinance()">Сохранить транзакцию</button>
            </div>
        </div>

    </div>

    <!-- === НАВИГАЦИЯ === -->
    <nav class="bottom-nav" id="main-nav">
        <button class="nav-item active" onclick="openTab('tab-calendar', this)">
            <span class="nav-icon">📅</span><span>График</span>
        </button>
        <button class="nav-item" onclick="openTab('tab-matches', this)">
            <span class="nav-icon">⚔️</span><span>Матчи</span>
        </button>
        <button class="nav-item" onclick="openTab('tab-board', this)">
            <span class="nav-icon">🗺️</span><span>Доска</span>
        </button>
        <button class="nav-item" onclick="openTab('tab-finance', this)">
            <span class="nav-icon">💎</span><span>Казна</span>
        </button>
        <button class="nav-item admin-only" style="display: none;" onclick="openTab('tab-admin', this)">
            <span class="nav-icon">⚙️</span><span>Кэп</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const urlParams = new URLSearchParams(window.location.search);
        let userRole = urlParams.get('role') || 'creator'; 
        const currentUser = tg.initDataUnsafe?.user || { username: "AdminTest", id: 7777777 };
        const usernameDisplay = currentUser.username ? `@${currentUser.username}` : "Player";

        /* === БАЗЫ ДАННЫХ (Пустые при старте) === */
        let eventsData = []; 
        let attendanceData = {}; 
        let financeData = [];

        let currentSelectedDate = 12; // Имитация сегодня

        /* === ИНИЦИАЛИЗАЦИЯ === */
        function initApp() {
            const uiRole = document.getElementById('ui-role');
            if (userRole === 'guest') {
                uiRole.innerText = 'ГОСТЬ';
                document.querySelector('.container').innerHTML = `<div class="empty-state" style="margin-top:50px;">ДОСТУП ЗАКРЫТ<br>Ожидайте принятия в клан руководством.</div>`;
                document.getElementById('main-nav').style.display = 'none';
                return;
            }
            if (userRole === 'player') uiRole.innerText = 'ИГРОК';
            if (userRole === 'captain' || userRole === 'creator') {
                uiRole.innerText = userRole === 'creator' ? 'СОЗДАТЕЛЬ' : 'КАПИТАН';
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'flex');
            }
            document.getElementById('new-event-date').value = '2026-06-12';
            renderCalendar();
            renderMatches();
            renderFinance();
        }

        function openTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if (btn) {
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                btn.classList.add('active');
                tg.HapticFeedback.selectionChanged();
            }
        }

        /* === КАЛЕНДАРЬ И МАТЧИ === */
        function renderCalendar() {
            const calBody = document.getElementById('calendar-body');
            calBody.innerHTML = '';
            for(let i = 1; i <= 30; i++) {
                const isWeekend = (i % 7 === 6 || i % 7 === 0);
                const isSelected = (i === currentSelectedDate) ? 'selected' : '';
                const weekendClass = isWeekend ? 'weekend' : '';
                
                let dayEvents = eventsData.filter(e => new Date(e.date).getDate() === i);
                let indicatorsHtml = '';
                dayEvents.forEach(e => {
                    let colorClass = e.type === 'prak' ? 'line-prak' : 'line-tour';
                    indicatorsHtml += `<div class="cal-line ${colorClass}"></div>`;
                });

                calBody.innerHTML += `
                    <div class="cal-day-box ${weekendClass} ${isSelected}" onclick="selectDate(${i})">
                        <span class="cal-num">${i}</span>
                        <div class="indicator-container">${indicatorsHtml}</div>
                    </div>
                `;
            }
            renderDailyEvents();
        }

        function selectDate(day) {
            tg.HapticFeedback.selectionChanged();
            currentSelectedDate = day;
            renderCalendar(); 
        }

        function createEvent() {
            const date = document.getElementById('new-event-date').value;
            const type = document.getElementById('new-event-type').value;
            const title = document.getElementById('new-event-title').value;
            const timeMap = document.getElementById('new-event-time').value;

            if(!date || !title) { tg.showAlert('Заполните дату и название!'); return; }

            const newEvent = { id: Date.now(), date, type, title, timeMap: timeMap || 'Время уточняется' };
            eventsData.push(newEvent);
            attendanceData[newEvent.id] = []; 
            
            tg.HapticFeedback.impactOccurred('heavy');
            tg.showAlert('Матч успешно создан!');
            
            renderCalendar();
            renderMatches();
            
            tg.sendData(JSON.stringify({ action: 'create_event', title: title, date: date }));
            document.getElementById('new-event-title').value = '';
            document.getElementById('new-event-time').value = '';
        }

        function renderDailyEvents() {
            const container = document.getElementById('daily-events-container');
            let dayEvents = eventsData.filter(e => new Date(e.date).getDate() === currentSelectedDate);
            container.innerHTML = generateCardsHtml(dayEvents, "В этот день нет запланированных игр.");
        }

        function renderMatches() {
            const container = document.getElementById('all-matches-container');
            container.innerHTML = generateCardsHtml(eventsData, "Список матчей пока пуст. Создатель еще не добавил расписание.");
        }

        function generateCardsHtml(eventsArr, emptyText) {
            if (eventsArr.length === 0) return `<div class="empty-state">${emptyText}</div>`;
            let html = '';
            eventsArr.forEach(evt => {
                let isAttending = attendanceData[evt.id].some(u => u.id === currentUser.id);
                let rosterHtml = attendanceData[evt.id].length === 0 
                    ? `<div class="roster-item" style="color:var(--text-muted); border:none;">Никто не записался</div>` 
                    : attendanceData[evt.id].map(u => `<div class="roster-item"><span class="r-name">${u.name}</span><span style="color:var(--text-muted)">ID: ${u.id}</span></div>`).join('');

                let badgeColor = evt.type === 'prak' ? 'var(--color-prak)' : 'var(--color-tour)';
                let typeName = evt.type === 'prak' ? 'ПРАК' : 'ТУРНИР';

                html += `
                    <div class="glass-card">
                        <div style="font-size:10px; color:${badgeColor}; font-weight:900; margin-bottom:5px;">${typeName}</div>
                        <div class="event-title">${evt.title}</div>
                        <div class="event-time">${evt.date} | ${evt.timeMap}</div>
                        <div class="btn-row">
                            <button class="btn btn-green" onclick="attend(${evt.id}, true)" ${isAttending?'style="box-shadow:0 0 15px var(--color-prak)"':''}>Я буду</button>
                            <button class="btn btn-red" onclick="attend(${evt.id}, false)">Пропуск</button>
                        </div>
                        <div class="roster-box">
                            <div style="font-size: 10px; color: var(--text-muted); margin-bottom: 8px; font-weight: 800;">СОСТАВ (${attendanceData[evt.id].length})</div>
                            ${rosterHtml}
                        </div>
                    </div>
                `;
            });
            return html;
        }

        function attend(eventId, status) {
            tg.HapticFeedback.impactOccurred('medium');
            let roster = attendanceData[eventId];
            let index = roster.findIndex(u => u.id === currentUser.id);
            if (status && index === -1) roster.push({ id: currentUser.id, name: usernameDisplay });
            if (!status && index > -1) roster.splice(index, 1);
            
            renderDailyEvents(); renderMatches();
            tg.sendData(JSON.stringify({ action: 'attend', eventId: eventId, status: status }));
        }

        /* === ФИНАНСЫ === */
        function addFinance() {
            const amount = document.getElementById('fin-amount').value;
            const desc = document.getElementById('fin-desc').value;
            const type = document.getElementById('fin-type').value;

            if(!amount || !desc) { tg.showAlert('Введите сумму и описание!'); return; }

            financeData.push({ amount: parseInt(amount), desc, type, date: new Date().toLocaleDateString() });
            tg.HapticFeedback.impactOccurred('heavy');
            
            document.getElementById('fin-amount').value = '';
            document.getElementById('fin-desc').value = '';
            
            renderFinance();
            tg.sendData(JSON.stringify({ action: 'add_finance', amount, desc, type }));
            tg.showAlert('Транзакция сохранена!');
        }

        function renderFinance() {
            let total = 0;
            let html = '';
            if (financeData.length === 0) {
                html = `<div class="empty-state">История пуста. Капитан еще не вносил данные.</div>`;
            } else {
                financeData.forEach(f => {
                    let isIncome = f.type === 'income';
                    total += isIncome ? f.amount : -f.amount;
                    html += `
                        <div class="glass-card" style="padding: 12px; display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <div style="font-weight: 800; font-size: 14px;">${f.desc}</div>
                                <div style="font-size: 10px; color: var(--text-muted);">${f.date}</div>
                            </div>
                            <div style="font-weight: 900; font-size: 16px; color: ${isIncome ? 'var(--color-prak)' : 'var(--color-weekend)'}">
                                ${isIncome ? '+' : '-'} ${f.amount} ₽
                            </div>
                        </div>
                    `;
                });
            }
            document.getElementById('total-balance').innerText = `${total} ₽`;
            document.getElementById('finance-history').innerHTML = html;
        }

        /* === ТАКТИЧЕСКАЯ ДОСКА (РИСОВАНИЕ И СКРОЛЛ) === */
        const canvasWrapper = document.getElementById('canvas-wrapper');
        const canvas = document.getElementById('tactic-canvas');
        const ctx = canvas.getContext('2d');
        
        let isDrawing = false;
        let drawColor = '#00F3FF';
        let boardMode = 'draw'; // 'draw' или 'move'
        
        let scale = 1; let panX = 0; let panY = 0;
        let isPanning = false; let startPanX = 0; let startPanY = 0;

        function setBoardMode(mode) {
            tg.HapticFeedback.selectionChanged();
            boardMode = mode;
            document.getElementById('btn-draw').classList.toggle('active', mode === 'draw');
            document.getElementById('btn-move').classList.toggle('active', mode === 'move');
        }

        function changeMap() {
            const mapFile = document.getElementById('map-select').value;
            if(mapFile !== 'none') canvas.style.backgroundImage = `url('${mapFile}')`;
            clearBoard();
        }

        function setColor(el, color) {
            drawColor = color;
            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
            setBoardMode('draw'); // Автоматом переключаем на рисование
        }

        function updateTransform() { canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`; }

        function zoomBoard(delta) {
            tg.HapticFeedback.selectionChanged();
            scale += delta;
            if(scale < 0.5) scale = 0.5;
            if(scale > 4) scale = 4;
            updateTransform();
        }

        function getMapPos(clientX, clientY) {
            const rect = canvasWrapper.getBoundingClientRect();
            return { x: (clientX - rect.left - panX) / scale, y: (clientY - rect.top - panY) / scale };
        }

        /* Логика касаний с учетом режима */
        canvasWrapper.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (e.touches.length === 1) {
                if (boardMode === 'move') {
                    isPanning = true;
                    startPanX = e.touches[0].clientX - panX;
                    startPanY = e.touches[0].clientY - panY;
                } else if (boardMode === 'draw') {
                    isDrawing = true;
                    const pos = getMapPos(e.touches[0].clientX, e.touches[0].clientY);
                    ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
                }
            }
        });

        canvasWrapper.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length === 1) {
                if (isPanning && boardMode === 'move') {
                    panX = e.touches[0].clientX - startPanX;
                    panY = e.touches[0].clientY - startPanY;
                    updateTransform();
                } else if (isDrawing && boardMode === 'draw') {
                    const pos = getMapPos(e.touches[0].clientX, e.touches[0].clientY);
                    ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                    ctx.strokeStyle = drawColor; ctx.shadowBlur = 8; ctx.shadowColor = drawColor;
                    ctx.lineTo(pos.x, pos.y); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
                }
            }
        });

        canvasWrapper.addEventListener('touchend', () => { isDrawing = false; isPanning = false; ctx.beginPath(); });

        /* Для ПК (Мышка) */
        canvasWrapper.addEventListener('mousedown', (e) => {
            if (boardMode === 'move') { isPanning = true; startPanX = e.clientX - panX; startPanY = e.clientY - panY; }
            else { isDrawing = true; const pos = getMapPos(e.clientX, e.clientY); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); }
        });
        canvasWrapper.addEventListener('mousemove', (e) => {
            if (isPanning && boardMode === 'move') { panX = e.clientX - startPanX; panY = e.clientY - startPanY; updateTransform(); }
            else if (isDrawing && boardMode === 'draw') {
                const pos = getMapPos(e.clientX, e.clientY);
                ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                ctx.strokeStyle = drawColor; ctx.shadowBlur = 8; ctx.shadowColor = drawColor;
                ctx.lineTo(pos.x, pos.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
            }
        });
        canvasWrapper.addEventListener('mouseup', () => { isDrawing = false; isPanning = false; ctx.beginPath(); });
        canvasWrapper.addEventListener('mouseleave', () => { isDrawing = false; isPanning = false; });

        function clearBoard() {
            tg.HapticFeedback.impactOccurred('rigid');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            scale = 1; panX = 0; panY = 0; updateTransform();
        }

        initApp();
    </script>
</body>
</html>
