<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Divo eSports Cosmic Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    <!-- Google Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <style>
        :root {
            --space-dark: #020108;
            --nebula-purple: rgba(138, 43, 226, 0.35);
            --nebula-blue: rgba(0, 195, 255, 0.25);
            --gold-divo: #F1C40F;
            --glass-bg: rgba(10, 10, 18, 0.65);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #FFFFFF;
            --text-muted: #8A8A93;
            --color-prak: #00FF88;
            --color-tour: #00F3FF;
            --color-review: #A200FF;
            --color-weekend: #FF4A4A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--space-dark);
            background-image: 
                radial-gradient(circle at 15% 15%, var(--nebula-purple) 0%, transparent 45%),
                radial-gradient(circle at 85% 85%, var(--nebula-blue) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(241, 196, 15, 0.05) 0%, transparent 50%);
            background-attachment: fixed; color: var(--text-main); overflow-x: hidden; padding-bottom: 110px;
        }

        .header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(180deg, rgba(2,1,8,0.95) 0%, transparent 100%);
            position: sticky; top: 0; z-index: 50; backdrop-filter: blur(12px);
        }

        .logo {
            font-size: 28px; font-weight: 900; letter-spacing: 2px;
            background: linear-gradient(135deg, #FFF, var(--gold-divo));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(241, 196, 15, 0.6);
        }

        .role-badge {
            font-size: 11px; font-weight: 800; padding: 6px 14px; border-radius: 8px;
            background: rgba(241, 196, 15, 0.15); border: 1px solid rgba(241, 196, 15, 0.5);
            color: var(--gold-divo); text-transform: uppercase; display: flex; align-items: center; gap: 5px;
        }

        .container { padding: 0 15px; }

        h2 {
            font-size: 17px; font-weight: 900; margin: 25px 0 15px;
            color: var(--text-main); text-transform: uppercase; letter-spacing: 1.5px;
            display: flex; align-items: center; gap: 10px; text-shadow: 0 0 15px rgba(255,255,255,0.3);
        }
        h2::before {
            content: ''; display: block; width: 4px; height: 18px; background: var(--gold-divo); border-radius: 2px;
        }

        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(30px); border: 1px solid var(--glass-border);
            border-radius: 18px; padding: 20px; margin-bottom: 18px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
        }

        /* Календарь */
        .month-title { text-align: center; font-size: 22px; font-weight: 900; margin-bottom: 15px; color: var(--gold-divo); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
        .cal-header { font-size: 12px; font-weight: 800; color: var(--text-muted); margin-bottom: 10px; }
        .cal-day-box { display: flex; flex-direction: column; align-items: center; height: 48px; position: relative; padding-top: 6px; cursor: pointer; }
        .cal-num { font-size: 17px; font-weight: 900; z-index: 2; transition: 0.2s; }
        .cal-day-box.selected::before {
            content: ''; position: absolute; top: -3px; left: 50%; transform: translateX(-50%);
            width: 36px; height: 44px; border: 2px solid rgba(255,255,255,0.8); border-radius: 10px; background: rgba(255,255,255,0.15); z-index: 1;
        }
        .indicator-container { display: flex; gap: 4px; margin-top: 6px; z-index: 2;}
        .cal-line { width: 6px; height: 6px; border-radius: 50%; } 
        .line-prak { background: var(--color-prak); }
        .line-tour { background: var(--color-tour); }
        .line-review { background: var(--color-review); }

        /* Кнопки */
        .btn-row { display: flex; gap: 12px; margin-bottom: 18px; }
        .btn { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: 900; font-size: 12px; text-transform: uppercase; cursor: pointer; color: #FFF; display: flex; justify-content: center; align-items: center; gap: 5px;}
        .btn-green { background: rgba(0, 255, 136, 0.15); border: 1px solid rgba(0, 255, 136, 0.6); color: var(--color-prak); }
        .btn-red { background: rgba(255, 74, 74, 0.15); border: 1px solid rgba(255, 74, 74, 0.6); color: var(--color-weekend); }
        .btn-gold { background: linear-gradient(45deg, #C29B0C, #F1C40F); color: #000; width: 100%; margin-bottom: 10px;}
        .btn-dark { background: rgba(0,0,0,0.7); border: 1px solid var(--glass-border); width: 100%; color: var(--text-main); margin-bottom: 10px; }

        /* Тактическая доска */
        .board-controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .map-select { flex: 1; min-width: 130px; padding: 14px; background: rgba(0,0,0,0.8); color: var(--gold-divo); border: 1px solid var(--glass-border); border-radius: 12px; outline: none; font-weight: 900;}
        .mode-toggle { display: flex; width: 100%; background: rgba(0,0,0,0.6); border-radius: 12px; padding: 5px; border: 1px solid var(--glass-border);}
        .mode-btn { flex: 1; padding: 12px; text-align: center; font-weight: 900; font-size: 13px; color: var(--text-muted); border-radius: 10px; transition: 0.3s; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 5px;}
        .mode-btn.active { background: var(--gold-divo); color: #000; }
        .canvas-container { width: 100%; height: 360px; background-color: #020108; border-radius: 14px; border: 1px solid var(--glass-border); overflow: hidden; position: relative; touch-action: none; }
        #tactic-canvas { transform-origin: 0 0; background-size: contain; background-position: center; background-repeat: no-repeat; }
        .color-picker { display: flex; justify-content: space-around; padding: 18px 0; background: rgba(0,0,0,0.4); border-radius: 14px; margin-bottom: 15px;}
        .color-dot { width: 26px; height: 26px; border-radius: 50%; border: 2px solid transparent; transition: 0.2s; cursor: pointer;}
        .color-dot.active { border-color: #FFF; transform: scale(1.3); }

        .input-dark { width: 100%; padding: 15px; background: rgba(0,0,0,0.7); border: 1px solid var(--glass-border); color: #FFF; border-radius: 12px; margin-bottom: 15px; font-size: 15px; font-weight: 800; outline: none;}
        .balance-sum { font-size: 48px; font-weight: 900; color: var(--gold-divo); text-align: center; text-shadow: 0 0 40px rgba(241, 196, 15, 0.6); margin: 25px 0; }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(2, 1, 8, 0.98); backdrop-filter: blur(30px);
            border-top: 1px solid var(--glass-border); display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .nav-item { background: none; border: none; color: var(--text-muted); font-size: 10px; font-weight: 900; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: 0.3s; cursor: pointer;}
        .nav-item.active { color: var(--gold-divo); }
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .material-symbols-outlined { font-size: 24px; }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; font-weight: 600; border: 1px dashed rgba(255,255,255,0.15); border-radius: 14px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">DIVO</div>
        <div class="role-badge" id="ui-role"><span class="material-symbols-outlined" style="font-size: 16px;">shield_person</span> Загрузка</div>
    </header>

    <div class="container">
        <!-- Календарь -->
        <div id="tab-calendar" class="tab-content active">
            <div class="month-title" id="current-month-title">ИЮНЬ 2026</div>
            <div class="glass-card" style="padding: 15px 10px;">
                <div class="cal-grid">
                    <div class="cal-header">ПН</div><div class="cal-header">ВТ</div><div class="cal-header">СР</div>
                    <div class="cal-header">ЧТ</div><div class="cal-header">ПТ</div><div class="cal-header" style="color:var(--color-weekend)">СБ</div><div class="cal-header" style="color:var(--color-weekend)">ВС</div>
                </div>
                <div class="cal-grid" id="calendar-body"></div>
            </div>
            <h2 id="selected-date-title">События на сегодня</h2>
            <div id="daily-events-container"></div>
            <h2>Задания</h2>
            <div class="glass-card" id="tasks-container"></div>
        </div>

        <!-- Матчи -->
        <div id="tab-matches" class="tab-content">
            <h2>Все матчи клана</h2>
            <div id="all-matches-container"></div>
        </div>

        <!-- Тактическая доска -->
        <div id="tab-board" class="tab-content">
            <h2>Тактическая доска</h2>
            <div class="glass-card" style="padding: 15px;">
                <div class="board-controls">
                    <select class="map-select" id="map-select" onchange="changeMap()">
                        <option value="none" disabled selected>-- Выбор Карты --</option>
                        <option value="sandstone.png">Sandstone</option>
                        <option value="province.png">Province</option>
                    </select>
                </div>
                
                <div class="mode-toggle" style="margin-bottom: 10px;">
                    <div class="mode-btn active" id="btn-draw" onclick="setBoardMode('draw')"><span class="material-symbols-outlined">edit</span> Рисовать</div>
                    <div class="mode-btn" id="btn-move" onclick="setBoardMode('move')"><span class="material-symbols-outlined">pan_tool</span> Двигать</div>
                    <div class="mode-btn" id="btn-erase" onclick="setBoardMode('erase')"><span class="material-symbols-outlined">ink_eraser</span> Ластик</div>
                </div>
                
                <div class="canvas-container" id="canvas-wrapper">
                    <canvas id="tactic-canvas" width="800" height="600"></canvas>
                </div>
                
                <div class="color-picker">
                    <div class="color-dot active" style="background: #00F3FF;" onclick="setColor(this, '#00F3FF')"></div>
                    <div class="color-dot" style="background: #00FF88;" onclick="setColor(this, '#00FF88')"></div>
                    <div class="color-dot" style="background: #E5C05C;" onclick="setColor(this, '#E5C05C')"></div>
                    <div class="color-dot" style="background: #A200FF;" onclick="setColor(this, '#A200FF')"></div>
                    <div class="color-dot" style="background: #FFFFFF;" onclick="setColor(this, '#FFFFFF')"></div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-dark" onclick="undoBoard()"><span class="material-symbols-outlined">undo</span> Шаг назад</button>
                    <button class="btn btn-dark" onclick="clearBoard()"><span class="material-symbols-outlined">delete</span> Очистить</button>
                </div>
            </div>
        </div>

        <!-- Казна -->
        <div id="tab-finance" class="tab-content">
            <h2>Казна клана</h2>
            <div class="glass-card">
                <div style="font-size: 11px; color: var(--text-muted); text-align: center; text-transform: uppercase;">Общий баланс</div>
                <div class="balance-sum" id="total-balance">0 G</div>
            </div>
            <h2>История транзакций</h2>
            <div id="finance-history"></div>
        </div>

        <!-- Админ Панель -->
        <div id="tab-admin" class="tab-content">
            <h2 style="color: var(--gold-divo);">Панель Капитана</h2>
            
            <div class="glass-card">
                <h3 style="font-size: 15px; margin-bottom: 15px;">Создать матч / Выходной</h3>
                <input type="date" id="new-event-date" class="input-dark">
                <select id="new-event-type" class="input-dark">
                    <option value="prak">Прак (Тренировка)</option>
                    <option value="tour">Турнир</option>
                    <option value="review">Разбор демок</option>
                    <option value="rest">Выходной</option>
                </select>
                <input type="text" id="new-event-title" class="input-dark" placeholder="Название (vs Horizon)">
                <input type="text" id="new-event-time" class="input-dark" placeholder="Время и Карта (20:00 - Sandstone)">
                <button class="btn btn-gold" onclick="createEvent()"><span class="material-symbols-outlined">publish</span> Опубликовать</button>
            </div>

            <div class="glass-card">
                <h3 style="font-size: 15px; margin-bottom: 15px;">Финансы</h3>
                <input type="number" id="fin-amount" class="input-dark" placeholder="Сумма (Голда)">
                <input type="text" id="fin-desc" class="input-dark" placeholder="Описание">
                <select id="fin-type" class="input-dark">
                    <option value="income">Доход (+)</option>
                    <option value="expense">Расход (-)</option>
                </select>
                <button class="btn btn-green" onclick="addFinance()"><span class="material-symbols-outlined">add_circle</span> Добавить</button>
            </div>
        </div>
    </div>

    <!-- Навигация с Material Icons -->
    <nav class="bottom-nav" id="main-nav">
        <button class="nav-item active" onclick="openTab('tab-calendar', this)">
            <span class="material-symbols-outlined">calendar_month</span><span>График</span>
        </button>
        <button class="nav-item" onclick="openTab('tab-matches', this)">
            <span class="material-symbols-outlined">sports_esports</span><span>Матчи</span>
        </button>
        <button class="nav-item" onclick="openTab('tab-board', this)">
            <span class="material-symbols-outlined">map</span><span>Доска</span>
        </button>
        <button class="nav-item" onclick="openTab('tab-finance', this)">
            <span class="material-symbols-outlined">account_balance_wallet</span><span>Казна</span>
        </button>
        <button class="nav-item admin-only" style="display: none;" onclick="openTab('tab-admin', this)">
            <span class="material-symbols-outlined">admin_panel_settings</span><span>Кэп</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); tg.ready();

        // ВНИМАНИЕ: Замени на свой сервер (обязательно https)
        const API_URL = 'https://qgoqy-5-53-118-251.run.pinggy-free.link/api';
        
        const urlParams = new URLSearchParams(window.location.search);
        let userRole = urlParams.get('role') || 'player'; 
        const currentUser = tg.initDataUnsafe?.user || { username: "Player", id: 12345 };

        let eventsData = []; let attendanceData = {}; let financeData = []; let tasksData = [];
        let currentSelectedDate = new Date().getDate();

        async function fetchData() {
            try {
                const res = await fetch(`${API_URL}/data`);
                const data = await res.json();
                eventsData = data.events; attendanceData = data.attendance;
                tasksData = data.tasks; financeData = data.finance;
                renderAll();
            } catch(e) { console.error('Ошибка связи с сервером', e); }
        }

        function renderAll() {
            renderCalendar(); renderDailyEvents(); renderMatches(); renderFinance();
        }

        function initApp() {
            const uiRole = document.getElementById('ui-role');
            if (userRole === 'guest') {
                document.querySelector('.container').innerHTML = `<div class="empty-state">Ожидайте принятия в клан.</div>`;
                document.getElementById('main-nav').style.display = 'none'; return;
            }
            if (userRole === 'captain' || userRole === 'creator') {
                uiRole.innerHTML = `<span class="material-symbols-outlined" style="font-size: 16px;">local_police</span> ${userRole === 'creator' ? 'Создатель' : 'Капитан'}`;
                document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'flex');
            } else {
                uiRole.innerHTML = `<span class="material-symbols-outlined" style="font-size: 16px;">person</span> Игрок`;
            }
            fetchData();
        }

        function openTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if (btn) {
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                btn.classList.add('active'); tg.HapticFeedback.selectionChanged();
            }
        }

        /* Календарь и Матчи */
        function renderCalendar() {
            const calBody = document.getElementById('calendar-body'); calBody.innerHTML = '';
            let days = new Date(new Date().getFullYear(), new Date().getMonth() + 1, 0).getDate();
            for(let i = 1; i <= days; i++) {
                const isSelected = (i === currentSelectedDate) ? 'selected' : '';
                let dayEvents = eventsData.filter(e => e.date.endsWith(`-${i.toString().padStart(2, '0')}`));
                
                let indicators = dayEvents.map(e => {
                    let color = e.type === 'prak' ? 'line-prak' : (e.type === 'tour' ? 'line-tour' : 'line-review');
                    return e.type !== 'rest' ? `<div class="cal-line ${color}"></div>` : '';
                }).join('');

                calBody.innerHTML += `<div class="cal-day-box ${isSelected}" onclick="selectDate(${i})"><span class="cal-num">${i}</span><div class="indicator-container">${indicators}</div></div>`;
            }
        }

        function selectDate(day) { currentSelectedDate = day; renderCalendar(); renderDailyEvents(); }

        async function createEvent() {
            const data = {
                date: document.getElementById('new-event-date').value,
                type: document.getElementById('new-event-type').value,
                title: document.getElementById('new-event-title').value || 'Выходной',
                timeMap: document.getElementById('new-event-time').value || '-'
            };
            await fetch(`${API_URL}/add_event`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
            fetchData(); tg.HapticFeedback.impactOccurred('heavy');
            openTab('tab-calendar', document.querySelectorAll('.nav-item')[0]);
        }

        function renderDailyEvents() {
            const container = document.getElementById('daily-events-container');
            let today = new Date();
            let dateStr = `${today.getFullYear()}-${(today.getMonth()+1).toString().padStart(2,'0')}-${currentSelectedDate.toString().padStart(2,'0')}`;
            let dayEvents = eventsData.filter(e => e.date === dateStr);
            container.innerHTML = generateCardsHtml(dayEvents, "Событий нет.");
        }

        function renderMatches() { document.getElementById('all-matches-container').innerHTML = generateCardsHtml(eventsData, "Событий нет."); }

        function generateCardsHtml(arr, empty) {
            if(!arr.length) return `<div class="empty-state">${empty}</div>`;
            return arr.map(evt => {
                if(evt.type === 'rest') return `<div class="glass-card" style="text-align:center; color:var(--color-weekend); font-weight:900;">ВЫХОДНОЙ <br><span style="font-size:12px;color:#888">${evt.date}</span></div>`;
                
                let roster = attendanceData[evt.id] || [];
                let isAttending = roster.some(u => u.id === currentUser.id);
                return `
                    <div class="glass-card">
                        <div style="font-weight:900; margin-bottom:8px;">${evt.title}</div>
                        <div style="font-size:12px; color:var(--gold-divo); margin-bottom:15px;">${evt.date} | ${evt.timeMap}</div>
                        <div class="btn-row">
                            <button class="btn btn-green" onclick="attend(${evt.id}, true)" ${isAttending?'style="box-shadow:0 0 10px var(--color-prak)"':''}><span class="material-symbols-outlined">check</span> Буду</button>
                            <button class="btn btn-red" onclick="attend(${evt.id}, false)"><span class="material-symbols-outlined">close</span> Пропуск</button>
                        </div>
                    </div>`;
            }).join('');
        }

        async function attend(eventId, status) {
            await fetch(`${API_URL}/attend`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({event_id: eventId, user_id: currentUser.id, username: currentUser.username, status: status})});
            fetchData();
        }

        /* Финансы */
        async function addFinance() {
            const data = {
                amount: parseInt(document.getElementById('fin-amount').value),
                desc: document.getElementById('fin-desc').value,
                type: document.getElementById('fin-type').value,
                date: new Date().toLocaleDateString()
            };
            await fetch(`${API_URL}/add_finance`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
            fetchData(); openTab('tab-finance', document.querySelectorAll('.nav-item')[3]);
        }

        function renderFinance() {
            let total = financeData.reduce((acc, f) => acc + (f.type === 'income' ? f.amount : -f.amount), 0);
            document.getElementById('total-balance').innerText = `${total} G`;
            document.getElementById('finance-history').innerHTML = financeData.map(f => `
                <div class="glass-card" style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${f.desc}</b><br><span style="font-size:11px;color:#888">${f.date}</span></div>
                    <div style="font-size:18px; font-weight:900; color:${f.type === 'income' ? 'var(--color-prak)' : 'var(--color-weekend)'}">${f.type==='income'?'+':'-'} ${f.amount} G</div>
                </div>`).join('');
        }

        /* Тактическая доска (Улучшена) */
        const canvas = document.getElementById('tactic-canvas'); const ctx = canvas.getContext('2d');
        let boardMode = 'draw'; let drawColor = '#00F3FF'; let history = [];
        let isDrawing = false; let scale = 1; let panX = 0; let panY = 0;
        let startX = 0; let startY = 0;

        function saveHistory() { history.push(canvas.toDataURL()); if(history.length > 10) history.shift(); }
        function undoBoard() {
            if(history.length === 0) return clearBoard();
            let img = new Image(); img.src = history.pop();
            img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); }
        }

        function setBoardMode(mode) {
            boardMode = mode;
            ['draw', 'move', 'erase'].forEach(m => document.getElementById(`btn-${m}`).classList.toggle('active', m === mode));
        }

        function setColor(el, color) { drawColor = color; setBoardMode('draw'); document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active')); el.classList.add('active'); }
        function changeMap() { canvas.style.backgroundImage = `url('${document.getElementById('map-select').value}')`; clearBoard(); }
        function clearBoard() { ctx.clearRect(0, 0, canvas.width, canvas.height); history = []; }
        function getPos(e) { 
            const rect = canvas.parentElement.getBoundingClientRect();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (clientX - rect.left - panX) / scale, y: (clientY - rect.top - panY) / scale };
        }

        canvas.parentElement.addEventListener('mousedown', startAction);
        canvas.parentElement.addEventListener('mousemove', moveAction);
        canvas.parentElement.addEventListener('mouseup', endAction);
        canvas.parentElement.addEventListener('touchstart', startAction);
        canvas.parentElement.addEventListener('touchmove', moveAction);
        canvas.parentElement.addEventListener('touchend', endAction);

        function startAction(e) {
            e.preventDefault();
            if(boardMode === 'move') { isDrawing = true; startX = (e.touches ? e.touches[0].clientX : e.clientX) - panX; startY = (e.touches ? e.touches[0].clientY : e.clientY) - panY; } 
            else { isDrawing = true; saveHistory(); const pos = getPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); }
        }

        function moveAction(e) {
            e.preventDefault();
            if(!isDrawing) return;
            if(boardMode === 'move') {
                panX = (e.touches ? e.touches[0].clientX : e.clientX) - startX;
                panY = (e.touches ? e.touches[0].clientY : e.clientY) - startY;
                canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
            } else {
                const pos = getPos(e);
                ctx.lineWidth = boardMode === 'erase' ? 20 : 4;
                ctx.globalCompositeOperation = boardMode === 'erase' ? "destination-out" : "source-over";
                ctx.strokeStyle = drawColor; ctx.lineCap = 'round';
                ctx.lineTo(pos.x, pos.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(pos.x, pos.y);
            }
        }
        function endAction() { isDrawing = false; ctx.beginPath(); ctx.globalCompositeOperation = "source-over"; }

        initApp();
    </script>
</body>
</html>
