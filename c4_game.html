<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Cosmic Vault - Ultra Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --gold: #F5D061;
            --dark-gold: #C5A059;
            --neon-gold: #ffdf73;
            --bg-grad-1: #0a0b0e;
            --bg-grad-2: #020203;
            --panel-bg: rgba(15, 17, 20, 0.75);
            --red: #FF003C;
            --neon-red: #ff3366;
        }
        
        body { 
            background: linear-gradient(135deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%); 
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            color: var(--gold); 
            font-family: 'Rajdhani', sans-serif; 
            text-align: center; 
            margin: 0; 
            overflow: hidden; 
            user-select: none; 
            touch-action: none; 
            height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Голографическая сетка на фоне */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(245, 208, 97, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(245, 208, 97, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            pointer-events: none;
        }
        
        #game-container { 
            padding: 20px; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            box-sizing: border-box; 
            position: relative;
        }

        .btn { 
            background: linear-gradient(135deg, var(--gold), var(--dark-gold)); 
            color: #000; 
            border: 1px solid rgba(255, 255, 255, 0.6); 
            padding: 16px 45px; 
            font-size: 22px; 
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700; 
            cursor: pointer; 
            text-transform: uppercase; 
            border-radius: 8px; 
            box-shadow: 0 0 15px rgba(245, 208, 97, 0.4), inset 0 2px 5px rgba(255, 255, 255, 0.5); 
            transition: all 0.2s ease;
            letter-spacing: 2px;
            animation: pulseGlow 2s infinite;
        }
        
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 15px rgba(245, 208, 97, 0.4), inset 0 2px 5px rgba(255, 255, 255, 0.5); }
            50% { box-shadow: 0 0 30px rgba(245, 208, 97, 0.8), inset 0 2px 5px rgba(255, 255, 255, 0.8); }
            100% { box-shadow: 0 0 15px rgba(245, 208, 97, 0.4), inset 0 2px 5px rgba(255, 255, 255, 0.5); }
        }

        .btn:active { transform: scale(0.92); animation: none; }
        .hidden { display: none !important; }

        .overlay-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .panel {
            background: var(--panel-bg);
            border: 1px solid rgba(245, 208, 97, 0.4);
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), inset 0 0 25px rgba(245, 208, 97, 0.1);
            width: 90%;
            max-width: 400px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .panel::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(245, 208, 97, 0.1) 0%, transparent 60%);
            animation: rotateGlow 10s linear infinite;
            z-index: -1;
        }

        @keyframes rotateGlow { 100% { transform: rotate(360deg); } }

        .stage-area { 
            width: 100%; 
            height: 65%; 
            position: relative; 
            display: none; 
            background: rgba(10, 12, 15, 0.6); 
            border-radius: 15px; 
            border: 1px solid rgba(245, 208, 97, 0.3); 
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.9), 0 0 20px rgba(245, 208, 97, 0.05);
            overflow: hidden;
            backdrop-filter: blur(8px);
        }

        .target { 
            width: 35px; height: 35px; /* Уменьшено */
            background: radial-gradient(circle, #fff, var(--gold), var(--dark-gold)); 
            position: absolute; border-radius: 50%; 
            box-shadow: 0 0 25px var(--neon-gold); 
            cursor: pointer;
        }

        #grid-container { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; 
            width: 90%; max-width: 320px; margin: 0 auto; margin-top: 30px; 
        }
        .grid-cell { 
            aspect-ratio: 1; background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(245, 208, 97, 0.2); 
            border-radius: 8px; transition: all 0.15s ease; 
        }
        .grid-cell.active { background: var(--gold); box-shadow: 0 0 30px var(--neon-gold); border-color: #fff; }
        .grid-cell.error { background: var(--red); box-shadow: 0 0 30px var(--neon-red); border-color: #fff; }

        .number-btn { 
            width: 45px; height: 45px; background: rgba(0,0,0,0.8); 
            border: 2px solid var(--gold); 
            color: var(--neon-gold); font-size: 22px; font-family: 'Rajdhani', sans-serif; font-weight: 700; position: absolute; 
            display: flex; justify-content: center; align-items: center; border-radius: 50%; 
            box-shadow: 0 0 20px rgba(245, 208, 97, 0.4);
            backdrop-filter: blur(5px);
        }

        .timer-display {
            position: absolute; top: 15px; width: 100%; text-align: center;
            color: var(--neon-red); font-size: 28px; font-weight: 700; text-shadow: 0 0 20px var(--neon-red);
            letter-spacing: 3px; z-index: 10;
        }

        #slider-container { 
            width: 90%; height: 60px; border: 1px solid rgba(245, 208, 97, 0.6); position: relative; 
            margin-top: 50px; border-radius: 12px; overflow: hidden; display: none; background: rgba(0,0,0,0.9);
            box-shadow: inset 0 0 30px #000, 0 0 15px rgba(245, 208, 97, 0.2);
        }
        #win-zone { position: absolute; height: 100%; width: 10%; background: rgba(245, 208, 97, 0.4); left: 75%; border-left: 2px solid var(--gold); border-right: 2px solid var(--gold); box-shadow: 0 0 25px var(--neon-gold); }
        #cursor { position: absolute; height: 100%; width: 4px; background: #fff; left: 0; box-shadow: 0 0 25px #fff, 0 0 15px #fff; }

        .sphere { width: 40px; height: 40px; border-radius: 50%; position: absolute; cursor: pointer; }
        .sphere.gold { background: radial-gradient(circle, #fff, var(--gold), var(--dark-gold)); box-shadow: 0 0 25px var(--neon-gold); }
        .sphere.red { background: radial-gradient(circle, #fff, var(--red), #8B0000); box-shadow: 0 0 25px var(--neon-red); border: 2px solid rgba(255,255,255,0.5); }

        #hold-zone {
            width: 150px; height: 150px;
            border: 3px solid rgba(245, 208, 97, 0.6);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 26px; font-weight: 700; margin: auto; margin-top: 50px;
            transition: all 0.2s;
            box-shadow: 0 0 40px rgba(245, 208, 97, 0.15);
            letter-spacing: 2px;
        }
        .warning-mode { background: radial-gradient(circle at 50% 50%, #4a0008, #050000) !important; }
        .warning-zone { border-color: var(--neon-red) !important; color: #fff !important; box-shadow: 0 0 60px var(--neon-red) !important; text-shadow: 0 0 15px #fff; }
        
        #progress-bar { width: 85%; height: 12px; background: rgba(0,0,0,0.6); border: 1px solid rgba(245, 208, 97, 0.4); border-radius: 10px; margin: 40px auto; overflow: hidden; display: none; }
        #progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--dark-gold), var(--neon-gold)); box-shadow: 0 0 20px var(--neon-gold); transition: width 0.1s linear; }

        h1 { text-shadow: 0 0 25px rgba(245, 208, 97, 0.8); font-size: 32px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 3px; }
        h2 { font-size: 24px; text-transform: uppercase; margin-top: 0; letter-spacing: 2px; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        p { color: rgba(255,255,255,0.8); font-size: 17px; margin-top: 15px; line-height: 1.5; font-weight: 500; }
        .red-text { color: var(--neon-red); font-weight: 700; text-shadow: 0 0 20px var(--neon-red); }
        .mistakes-counter { position: absolute; top: 15px; right: 15px; font-size: 18px; font-weight: bold; color: var(--neon-red); text-shadow: 0 0 10px var(--neon-red); display: none; }
    </style>
</head>
<body>
    <div id="game-container">
        
        <div id="mistakes-ui" class="mistakes-counter">Ошибки: 0/2</div>

        <div id="cooldown-screen" class="overlay-screen hidden">
            <div class="panel">
                <h2 class="red-text">ДОСТУП ЗАКРЫТ</h2>
                <p>Критический сбой протокола. Система заблокирована для предотвращения взлома.</p>
                <h1 id="cd-timer" class="red-text">50</h1>
            </div>
        </div>

        <div id="prep-screen" class="overlay-screen hidden">
            <div class="panel">
                <h2 id="prep-title" style="color: var(--neon-gold);">ЭТАП</h2>
                <p id="prep-desc">Описание</p>
                <button id="prep-btn" class="btn" style="margin-top: 25px;">ИНИЦИАЛИЗАЦИЯ</button>
            </div>
        </div>

        <h1 id="title">COSMIC VAULT</h1>
        <p id="info" style="margin-bottom: 30px;">Элитный протокол защиты Vertex.</p>
        
        <button id="start-btn" class="btn">НАЧАТЬ ВЗЛОМ</button>

        <div id="stage-1-area" class="stage-area"></div>
        <div id="stage-2-area" class="stage-area" style="border: none; background: none; box-shadow: none; backdrop-filter: none;">
            <div id="grid-container"></div>
        </div>
        <div id="stage-3-area" class="stage-area">
            <div id="s3-timer-display" class="timer-display hidden">00:10</div>
        </div>
        <div id="slider-container">
            <div id="win-zone"></div>
            <div id="cursor"></div>
        </div>
        <div id="stage-5-area" class="stage-area">
            <div id="s5-timer-display" class="timer-display hidden">00:08</div>
        </div>
        <div id="stage-6-area" class="stage-area" style="border: none; background: none; box-shadow: none; backdrop-filter: none;">
            <div id="hold-zone">ДЕРЖИ</div>
            <div id="progress-bar"><div id="progress-fill"></div></div>
        </div>

        <button id="action-btn" class="btn hidden" style="margin-top: 40px;">ОСТАНОВИТЬ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const ui = {
            title: document.getElementById('title'),
            info: document.getElementById('info'),
            startBtn: document.getElementById('start-btn'),
            actionBtn: document.getElementById('action-btn'),
            cdScreen: document.getElementById('cooldown-screen'),
            cdTimer: document.getElementById('cd-timer'),
            prepScreen: document.getElementById('prep-screen'),
            prepTitle: document.getElementById('prep-title'),
            prepDesc: document.getElementById('prep-desc'),
            prepBtn: document.getElementById('prep-btn'),
            mistakesUI: document.getElementById('mistakes-ui'),
            s3TimerDisplay: document.getElementById('s3-timer-display'),
            s5TimerDisplay: document.getElementById('s5-timer-display'),
            areas: {
                1: document.getElementById('stage-1-area'),
                2: document.getElementById('stage-2-area'),
                3: document.getElementById('stage-3-area'),
                4: document.getElementById('slider-container'),
                5: document.getElementById('stage-5-area'),
                6: document.getElementById('stage-6-area')
            }
        };

        const COOLDOWN_TIME = 50000; 
        
        // Глобальные таймеры для очистки
        let s1Timeout;
        let s3TimerInterval;
        let s5TimerInterval;
        let sphereInterval;
        let holdTimer;

        window.onload = () => {
            if (checkCooldown()) return;
        };

        function checkCooldown() {
            let cdEnds = localStorage.getItem('c4_cooldown');
            if (cdEnds && Date.now() < parseInt(cdEnds)) {
                startCooldownDisplay(parseInt(cdEnds));
                return true;
            }
            return false;
        }

        function triggerFail() {
            if (s1Timeout) clearTimeout(s1Timeout);
            if (s3TimerInterval) clearInterval(s3TimerInterval);
            if (s5TimerInterval) clearInterval(s5TimerInterval);
            if (sphereInterval) clearTimeout(sphereInterval);
            if (holdTimer) clearInterval(holdTimer);
            
            tg.HapticFeedback.notificationOccurred('error');
            let ends = Date.now() + COOLDOWN_TIME;
            localStorage.setItem('c4_cooldown', ends);
            
            Object.values(ui.areas).forEach(el => el.style.display = 'none');
            ui.actionBtn.classList.add('hidden');
            ui.prepScreen.classList.add('hidden');
            ui.mistakesUI.style.display = 'none';
            ui.s3TimerDisplay.classList.add('hidden');
            ui.s5TimerDisplay.classList.add('hidden');
            
            startCooldownDisplay(ends);
        }

        function startCooldownDisplay(endTime) {
            ui.startBtn.classList.add('hidden');
            ui.cdScreen.classList.remove('hidden');
            
            let int = setInterval(() => {
                let left = Math.ceil((endTime - Date.now()) / 1000);
                if (left <= 0) {
                    clearInterval(int);
                    localStorage.removeItem('c4_cooldown');
                    location.reload();
                } else {
                    ui.cdTimer.innerText = left;
                }
            }, 1000);
        }

        const stageConfigs = {
            1: { title: "ЭТАП 1: РЕФЛЕКСЫ", desc: "Уничтожь 12 мишеней. У тебя всего 0.6 секунд на каждую! Максимум 2 ошибки." },
            2: { title: "ЭТАП 2: ДАМП ПАМЯТИ", desc: "Запомни 6 золотых секторов. Время на запоминание: 0.1 секунд." },
            3: { title: "ЭТАП 3: ДЕШИФРАТОР", desc: "Нажимай цифры от 1 до 12. Жесткий лимит - 9 секунд." },
            4: { title: "ЭТАП 4: СИНХРОНИЗАЦИЯ", desc: "Останови ядро точно в золотой зоне." },
            5: { title: "ЭТАП 5: ФОКУС", desc: "Собери 5 золотых сфер за 8 секунд. Игнорируй красные обманки." },
            6: { title: "ФИНАЛ: КОНТРОЛЬ", desc: "Зажми кольцо. Если система загорится КРАСНЫМ - немедленно отпусти палец!" }
        };

        ui.startBtn.onclick = () => {
            ui.startBtn.classList.add('hidden');
            showPrep(1);
        };

        function showPrep(stage) {
            ui.title.innerText = `ВЗЛОМ: ШАГ ${stage}/6`;
            ui.info.innerText = "";
            ui.mistakesUI.style.display = 'none';
            ui.s3TimerDisplay.classList.add('hidden');
            ui.s5TimerDisplay.classList.add('hidden');
            Object.values(ui.areas).forEach(el => el.style.display = 'none');
            
            ui.prepTitle.innerText = stageConfigs[stage].title;
            ui.prepDesc.innerText = stageConfigs[stage].desc;
            ui.prepScreen.classList.remove('hidden');
            
            ui.prepBtn.onclick = () => {
                ui.prepScreen.classList.add('hidden');
                startStage(stage);
            };
        }

        function startStage(stage) {
            if (stage === 1) startStage1();
            if (stage === 2) startStage2();
            if (stage === 3) startStage3();
            if (stage === 4) startStage4();
            if (stage === 5) startStage5();
            if (stage === 6) startStage6();
        }

        // --- ЭТАП 1: Тайминг 0.5 сек ---
        let targetsHit = 0;
        let mistakes = 0;
        
        function startStage1() {
            ui.areas[1].style.display = 'block';
            ui.mistakesUI.style.display = 'block';
            targetsHit = 0;
            mistakes = 0;
            ui.mistakesUI.innerText = `Ошибки: ${mistakes}/2`;
            
            ui.areas[1].onpointerdown = (e) => {
                if (e.target === ui.areas[1]) {
                    mistakes++;
                    ui.mistakesUI.innerText = `Ошибки: ${mistakes}/2`;
                    tg.HapticFeedback.notificationOccurred('warning');
                    if (mistakes > 2) {
                        clearTimeout(s1Timeout);
                        triggerFail();
                    }
                }
            };
            spawnTarget();
        }

        function spawnTarget() {
            if (targetsHit >= 12) {
                clearTimeout(s1Timeout);
                return showPrep(2);
            }
            ui.areas[1].innerHTML = '';
            
            const target = document.createElement('div');
            target.className = 'target';
            const maxX = ui.areas[1].clientWidth - 45;
            const maxY = ui.areas[1].clientHeight - 45;
            target.style.left = Math.floor(Math.random() * maxX) + 'px';
            target.style.top = Math.floor(Math.random() * maxY) + 'px';
            
            target.onpointerdown = (e) => {
                e.stopPropagation(); 
                clearTimeout(s1Timeout);
                targetsHit++;
                tg.HapticFeedback.impactOccurred('light');
                spawnTarget();
            };
            ui.areas[1].appendChild(target);

            // Таймер 0.5 секунд на реакцию
            s1Timeout = setTimeout(() => {
                mistakes++;
                ui.mistakesUI.innerText = `Ошибки: ${mistakes}/2`;
                tg.HapticFeedback.notificationOccurred('warning');
                if (mistakes > 2) {
                    triggerFail();
                } else {
                    spawnTarget();
                }
            }, 600);
        }

        // --- ЭТАП 2: Запоминание 6 блоков, 0.1 сек ---
        let memorySeq = [], playerSeq = [];
        function startStage2() {
            ui.areas[2].style.display = 'block';
            const grid = document.getElementById('grid-container');
            grid.innerHTML = '';
            memorySeq = []; playerSeq = [];
            
            for (let i = 0; i < 16; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                cell.dataset.index = i;
                grid.appendChild(cell);
            }

            // Генерируем 6 блоков
            while (memorySeq.length < 6) {
                let r = Math.floor(Math.random() * 16);
                if (!memorySeq.includes(r)) memorySeq.push(r);
            }

            setTimeout(() => {
                const cells = document.querySelectorAll('.grid-cell');
                memorySeq.forEach(idx => cells[idx].classList.add('active'));
                tg.HapticFeedback.impactOccurred('heavy');
                
                // Изменено на 100 мс
                setTimeout(() => {
                    cells.forEach(c => c.classList.remove('active'));
                    enableGridClicks(cells);
                }, 100); 
            }, 400);
        }

        function enableGridClicks(cells) {
            cells.forEach(cell => {
                cell.onpointerdown = () => {
                    const idx = parseInt(cell.dataset.index);
                    if (playerSeq.includes(idx)) return;
                    
                    if (memorySeq.includes(idx)) {
                        cell.classList.add('active');
                        playerSeq.push(idx);
                        tg.HapticFeedback.impactOccurred('light');
                        if (playerSeq.length === 6) setTimeout(() => showPrep(3), 300);
                    } else {
                        cell.classList.add('error');
                        triggerFail();
                    }
                };
            });
        }

        // --- ЭТАП 3: Лимит 9 секунд ---
        let currentNum = 1;
        let s3TimeLeft = 9;
        
        function startStage3() {
            ui.areas[3].style.display = 'block';
            
            Array.from(ui.areas[3].children).forEach(child => {
                if(child.id !== 's3-timer-display') child.remove();
            });
            
            ui.s3TimerDisplay.innerText = "00:09";
            ui.s3TimerDisplay.classList.remove('hidden');
            currentNum = 1;
            s3TimeLeft = 9;
            
            const positions = [];
            const size = 55; 
            const maxX = ui.areas[3].clientWidth - 55;
            const maxY = ui.areas[3].clientHeight - 55;

            for (let i = 1; i <= 12; i++) {
                let x, y, overlap;
                let attempts = 0;
                do {
                    overlap = false;
                    x = Math.random() * maxX;
                    y = 40 + Math.random() * (maxY - 40); 
                    for (let pos of positions) {
                        if (Math.hypot(pos.x - x, pos.y - y) < size) {
                            overlap = true; break;
                        }
                    }
                    attempts++;
                } while (overlap && attempts < 200);
                
                positions.push({x, y});

                const btn = document.createElement('div');
                btn.className = 'number-btn';
                btn.innerText = i;
                btn.style.left = x + 'px';
                btn.style.top = y + 'px';
                
                btn.onpointerdown = () => {
                    if (i === currentNum) {
                        btn.style.background = "var(--neon-gold)";
                        btn.style.color = "#000";
                        tg.HapticFeedback.impactOccurred('light');
                        currentNum++;
                        setTimeout(() => btn.style.display = 'none', 80);
                        if (currentNum > 12) {
                            clearInterval(s3TimerInterval);
                            showPrep(4);
                        }
                    } else {
                        triggerFail();
                    }
                };
                ui.areas[3].appendChild(btn);
            }

            s3TimerInterval = setInterval(() => {
                s3TimeLeft--;
                ui.s3TimerDisplay.innerText = `00:${s3TimeLeft < 9 ? '0' + s3TimeLeft : s3TimeLeft}`;
                if (s3TimeLeft <= 0) {
                    clearInterval(s3TimerInterval);
                    triggerFail();
                }
            }, 900);
        }

        // --- ЭТАП 4 ---
        let cursorInt, cursorPos = 0, cursorDir = 1;
        function startStage4() {
            ui.areas[4].style.display = 'block';
            ui.actionBtn.classList.remove('hidden');
            cursorPos = 0; cursorDir = 1;
            
            cursorInt = setInterval(() => {
                cursorPos += 3.8 * cursorDir; // Чуть быстрее
                if (cursorPos >= 100 || cursorPos <= 0) cursorDir *= -1;
                document.getElementById('cursor').style.left = cursorPos + '%';
            }, 16);

            ui.actionBtn.onclick = () => {
                clearInterval(cursorInt);
                if (cursorPos >= 75 && cursorPos <= 85) {
                    ui.actionBtn.classList.add('hidden');
                    tg.HapticFeedback.notificationOccurred('success');
                    setTimeout(() => showPrep(5), 500); 
                } else {
                    triggerFail();
                }
            };
        }

        // --- ЭТАП 5: Лимит 8 секунд, быстрые шары ---
        let goldCollected = 0;
        let s5TimeLeft = 8;
        
        function startStage5() {
            ui.areas[5].style.display = 'block';
            goldCollected = 0;
            s5TimeLeft = 8;
            
            Array.from(ui.areas[5].children).forEach(child => {
                if(child.id !== 's5-timer-display') child.remove();
            });
            
            ui.s5TimerDisplay.innerText = "00:08";
            ui.s5TimerDisplay.classList.remove('hidden');
            
            // Запуск таймера
            s5TimerInterval = setInterval(() => {
                s5TimeLeft--;
                ui.s5TimerDisplay.innerText = `00:0${s5TimeLeft}`;
                if (s5TimeLeft <= 0) {
                    clearInterval(s5TimerInterval);
                    clearTimeout(sphereInterval);
                    triggerFail();
                }
            }, 1000);

            function spawnSpheres() {
                if (goldCollected >= 5 || s5TimeLeft <= 0) return;
                
                // Очищаем старые сферы, кроме таймера
                Array.from(ui.areas[5].children).forEach(child => {
                    if(child.id !== 's5-timer-display') child.remove();
                });
                
                spawnSingleSphere('gold');
                spawnSingleSphere('red');
                spawnSingleSphere('red');
                spawnSingleSphere('red'); // Добавлена третья красная
                
                // Обновление быстрее (каждые 0.7 сек)
                sphereInterval = setTimeout(spawnSpheres, 700);
            }
            
            function spawnSingleSphere(type) {
                const sphere = document.createElement('div');
                sphere.className = `sphere ${type}`;
                const maxX = ui.areas[5].clientWidth - 50;
                const maxY = ui.areas[5].clientHeight - 50;
                sphere.style.left = Math.floor(Math.random() * maxX) + 'px';
                sphere.style.top = 40 + Math.floor(Math.random() * (maxY - 40)) + 'px';
                
                sphere.onpointerdown = (e) => {
                    e.stopPropagation();
                    if (type === 'gold') {
                        goldCollected++;
                        tg.HapticFeedback.impactOccurred('light');
                        sphere.style.display = 'none';
                        if (goldCollected >= 5) {
                            clearInterval(s5TimerInterval);
                            clearTimeout(sphereInterval);
                            setTimeout(() => showPrep(6), 300);
                        }
                    } else {
                        triggerFail();
                    }
                };
                ui.areas[5].appendChild(sphere);
            }
            
            spawnSpheres();
        }

        // --- ЭТАП 6 ---
        let isHolding = false, isAlarm = false, progress = 0;
        function startStage6() {
            ui.areas[6].style.display = 'block';
            document.getElementById('progress-bar').style.display = 'block';
            const fill = document.getElementById('progress-fill');
            const zone = document.getElementById('hold-zone');
            
            fill.style.width = '0%';
            progress = 0; isHolding = false; isAlarm = false;
            
            zone.onpointerdown = (e) => { e.preventDefault(); isHolding = true; zone.style.transform = 'scale(0.9)'; zone.style.boxShadow = '0 0 60px rgba(245, 208, 97, 0.5)'; };
            document.onpointerup = () => { isHolding = false; zone.style.transform = 'scale(1)'; zone.style.boxShadow = '0 0 40px rgba(245, 208, 97, 0.15)'; };

            function scheduleAlarm() {
                if (progress >= 100) return;
                const delay = 1500 + Math.random() * 3500;
                setTimeout(() => {
                    if (progress >= 100) return;
                    isAlarm = true;
                    document.body.classList.add('warning-mode');
                    zone.classList.add('warning-zone');
                    zone.innerText = "ОТПУСК!";
                    tg.HapticFeedback.notificationOccurred('error');
                    
                    setTimeout(() => {
                        isAlarm = false;
                        document.body.classList.remove('warning-mode');
                        zone.classList.remove('warning-zone');
                        zone.innerText = "ДЕРЖИ";
                        scheduleAlarm();
                    }, 400 + Math.random() * 400); // Реакция стала еще быстрее
                }, delay);
            }
            scheduleAlarm();

            holdTimer = setInterval(() => {
                if (isHolding && isAlarm) {
                    clearInterval(holdTimer);
                    document.body.classList.remove('warning-mode');
                    document.onpointerup = null;
                    triggerFail();
                    return;
                }
                
                if (isHolding && !isAlarm) {
                    progress += 0.5; 
                    fill.style.width = progress + '%';
                    if (progress >= 100) {
                        clearInterval(holdTimer);
                        document.onpointerup = null;
                        winGame();
                    }
                } else if (!isHolding && !isAlarm && progress > 0) {
                    progress -= 0.25; 
                    fill.style.width = progress + '%';
                }
            }, 100);
        }

        // --- ПОБЕДА ---
    function winGame() {
        ui.areas[6].style.display = 'none';
        document.getElementById('progress-bar').style.display = 'none';
        ui.title.innerText = "СИСТЕМА ВЗЛОМАНА";
        ui.title.style.color = "var(--neon-gold)";
        ui.title.style.textShadow = "0 0 30px var(--neon-gold)";
    
        // Оставил только сообщение, так как код выдаст сам бот
        ui.info.innerHTML = "Ты прошел этот ад.<br><br>Возвращайся в бота за своей наградой!";
        tg.HapticFeedback.notificationOccurred('success');

        // Перенаправляем пользователя в бота с победной командой
        // ВАЖНО: Замени 'ТВОЙ_ЮЗЕРНЕЙМ_БОТА' на реальный юзернейм твоего бота (без символа @)
        setTimeout(() => {
            tg.openTelegramLink('https://t.me/zentrox_BIO?start=win_777_secret');
        }, 1500); // Задержка в 1.5 секунды, чтобы игрок успел увидеть надпись о победе
    }
    </script>
