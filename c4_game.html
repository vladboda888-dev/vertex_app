<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Cosmic Vault - Premium Hack</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --gold: #FFD700;
            --dark-gold: #B8860B;
            --bg: #050505;
            --panel: #111;
            --red: #ff004c;
        }
        
        body { 
            background: var(--bg); 
            color: var(--gold); 
            font-family: 'Courier New', Courier, monospace; 
            text-align: center; 
            margin: 0; 
            overflow: hidden; 
            user-select: none; 
            touch-action: none; 
        }
        
        #game-container { 
            padding: 20px; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            box-sizing: border-box; 
            position: relative;
        }

        /* Премиальные кнопки */
        .btn { 
            background: linear-gradient(45deg, var(--dark-gold), var(--gold)); 
            color: #000; 
            border: none; 
            padding: 15px 35px; 
            font-size: 18px; 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase; 
            border-radius: 8px; 
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); 
            transition: 0.1s;
        }
        .btn:active { transform: scale(0.95); box-shadow: 0 0 10px rgba(255, 215, 0, 0.8); }
        .hidden { display: none !important; }

        /* Экраны подготовки и кулдауна */
        .overlay-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .panel {
            background: var(--panel);
            border: 2px solid var(--dark-gold);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(218, 165, 32, 0.2);
            width: 90%;
            max-width: 400px;
        }

        /* Общие стили арен */
        .stage-area { 
            width: 100%; 
            height: 65%; 
            position: relative; 
            display: none; 
            background: radial-gradient(circle, #1a1a1a, #000); 
            border-radius: 15px; 
            border: 1px solid var(--dark-gold); 
            box-shadow: inset 0 0 20px rgba(255, 215, 0, 0.05);
            overflow: hidden;
        }

        /* Этап 1: Аим */
        .target { 
            width: 35px; height: 35px; 
            background: radial-gradient(circle, var(--gold), var(--dark-gold)); 
            position: absolute; border-radius: 50%; 
            box-shadow: 0 0 15px var(--gold); 
        }

        /* Этап 2: Память */
        #grid-container { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; 
            width: 90%; max-width: 320px; margin: 0 auto; margin-top: 20px; 
        }
        .grid-cell { 
            aspect-ratio: 1; background: #151515; border: 1px solid var(--dark-gold); 
            border-radius: 8px; transition: 0.1s; 
        }
        .grid-cell.active { background: var(--gold); box-shadow: 0 0 20px var(--gold); }
        .grid-cell.error { background: var(--red); box-shadow: 0 0 20px var(--red); border-color: var(--red); }

        /* Этап 3: Дешифратор */
        .number-btn { 
            width: 45px; height: 45px; background: #111; border: 2px solid var(--gold); 
            color: var(--gold); font-size: 22px; font-weight: bold; position: absolute; 
            display: flex; justify-content: center; align-items: center; border-radius: 50%; 
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        /* Этап 4: Тайминг */
        #slider-container { 
            width: 90%; height: 60px; border: 2px solid var(--gold); position: relative; 
            margin-top: 40px; border-radius: 15px; overflow: hidden; display: none; background: #111;
        }
        #win-zone { position: absolute; height: 100%; width: 10%; background: rgba(255, 215, 0, 0.4); left: 75%; box-shadow: 0 0 15px var(--gold); }
        #cursor { position: absolute; height: 100%; width: 4px; background: #fff; left: 0; box-shadow: 0 0 15px #fff; }

        /* Этап 6: Удержание */
        #hold-zone {
            width: 150px; height: 150px;
            border: 3px dashed var(--gold);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; font-weight: bold; margin: auto; margin-top: 40px;
            transition: 0.2s;
        }
        .warning-mode { background: #3a0000 !important; }
        .warning-zone { border-color: var(--red) !important; color: var(--red) !important; box-shadow: 0 0 30px var(--red); }
        #progress-bar { width: 80%; height: 20px; border: 2px solid var(--gold); border-radius: 10px; margin: 20px auto; overflow: hidden; display: none; }
        #progress-fill { width: 0%; height: 100%; background: var(--gold); }

        h1 { text-shadow: 0 0 15px rgba(255, 215, 0, 0.5); font-size: 24px; margin-bottom: 5px; text-transform: uppercase; }
        h2 { font-size: 20px; text-transform: uppercase; margin-top: 0; }
        p { color: #ccc; font-size: 15px; margin-top: 10px; line-height: 1.4; }
        .red-text { color: var(--red); font-weight: bold; text-shadow: 0 0 10px var(--red); }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="cooldown-screen" class="overlay-screen hidden">
            <div class="panel">
                <h2 class="red-text">СИСТЕМА ЗАБЛОКИРОВАНА</h2>
                <p>Зафиксирована попытка несанкционированного доступа. Ожидайте сброса защиты.</p>
                <h1 id="cd-timer" class="red-text">60</h1>
            </div>
        </div>

        <div id="prep-screen" class="overlay-screen hidden">
            <div class="panel">
                <h2 id="prep-title">ЭТАП</h2>
                <p id="prep-desc">Описание</p>
                <button id="prep-btn" class="btn">ПРИСТУПИТЬ</button>
            </div>
        </div>

        <h1 id="title">COSMIC VAULT</h1>
        <p id="info" style="margin-bottom: 20px;">Элитный протокол безопасности.</p>
        
        <button id="start-btn" class="btn">НАЧАТЬ ВЗЛОМ</button>

        <div id="stage-1-area" class="stage-area"></div>
        
        <div id="stage-2-area" class="stage-area" style="border: none; background: none; box-shadow: none;">
            <div id="grid-container"></div>
        </div>

        <div id="stage-3-area" class="stage-area"></div>

        <div id="slider-container">
            <div id="win-zone"></div>
            <div id="cursor"></div>
        </div>
        
        <div id="stage-6-area" class="stage-area" style="border: none; background: none; box-shadow: none;">
            <div id="hold-zone">ДЕРЖИ</div>
            <div id="progress-bar"><div id="progress-fill"></div></div>
        </div>

        <button id="action-btn" class="btn hidden" style="margin-top: 30px;">ОСТАНОВИТЬ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Элементы
        const ui = {
            title: document.getElementById('title'),
            info: document.getElementById('info'),
            startBtn: document.getElementById('start-btn'),
            actionBtn: document.getElementById('action-btn'),
            cdScreen: document.getElementById('cooldown-screen'),
            cdTimer: document.getElementById('cd-timer'),
            prepScreen: document.getElementById('prep-screen'),
            prepTitle: document.getElementById('prep-title'),
            prepDesc: document.getElementById('prep-desc'),
            prepBtn: document.getElementById('prep-btn'),
            areas: {
                1: document.getElementById('stage-1-area'),
                2: document.getElementById('stage-2-area'),
                3: document.getElementById('stage-3-area'),
                4: document.getElementById('slider-container'),
                6: document.getElementById('stage-6-area')
            }
        };

        // Глобальные переменные
        const COOLDOWN_TIME = 60000; 
        let currentStage = 1;

        // Инициализация при загрузке
        window.onload = () => {
            if (checkCooldown()) return;
        };

        // --- ЛОГИКА КУЛДАУНА ---
        function checkCooldown() {
            let cdEnds = localStorage.getItem('c4_cooldown');
            if (cdEnds && Date.now() < parseInt(cdEnds)) {
                startCooldownDisplay(parseInt(cdEnds));
                return true;
            }
            return false;
        }

        function triggerFail() {
            tg.HapticFeedback.notificationOccurred('error');
            let ends = Date.now() + COOLDOWN_TIME;
            localStorage.setItem('c4_cooldown', ends);
            
            // Скрываем всё
            Object.values(ui.areas).forEach(el => el.style.display = 'none');
            ui.actionBtn.classList.add('hidden');
            ui.prepScreen.classList.add('hidden');
            
            startCooldownDisplay(ends);
        }

        function startCooldownDisplay(endTime) {
            ui.startBtn.classList.add('hidden');
            ui.cdScreen.classList.remove('hidden');
            
            let int = setInterval(() => {
                let left = Math.ceil((endTime - Date.now()) / 1000);
                if (left <= 0) {
                    clearInterval(int);
                    localStorage.removeItem('c4_cooldown');
                    location.reload();
                } else {
                    ui.cdTimer.innerText = left;
                }
            }, 1000);
        }

        // --- ПОДГОТОВКА ЭТАПОВ ---
        const stageConfigs = {
            1: { title: "ЭТАП 1: РЕФЛЕКСЫ", desc: "Уничтожь 12 мишеней. Они очень мелкие. Право на ошибку: НЕТ." },
            2: { title: "ЭТАП 2: ДАМП ПАМЯТИ", desc: "Запомни 5 золотых секторов на сетке 4x4. Время на запоминание: 1 секунда." },
            3: { title: "ЭТАП 3: ДЕШИФРАТОР", desc: "Собери код. Нажимай цифры строго от 1 до 12. Времени мало." },
            4: { title: "ЭТАП 4: СИНХРОНИЗАЦИЯ", desc: "Останови ядро точно в золотой зоне. Скорость ядра критическая." },
            6: { title: "ФИНАЛ: АБСОЛЮТНЫЙ КОНТРОЛЬ", desc: "Зажми сканер и держи. Если система загорится КРАСНЫМ (ТРЕВОГА) — немедленно отпусти палец! Заполни шкалу до 100%." }
        };

        ui.startBtn.onclick = () => {
            ui.startBtn.classList.add('hidden');
            showPrep(1);
        };

        function showPrep(stage) {
            currentStage = stage;
            ui.title.innerText = `ВЗЛОМ: ШАГ ${stage}/5`;
            ui.info.innerText = "";
            Object.values(ui.areas).forEach(el => el.style.display = 'none');
            
            ui.prepTitle.innerText = stageConfigs[stage].title;
            ui.prepDesc.innerText = stageConfigs[stage].desc;
            ui.prepScreen.classList.remove('hidden');
            
            ui.prepBtn.onclick = () => {
                ui.prepScreen.classList.add('hidden');
                startStage(stage);
            };
        }

        function startStage(stage) {
            if (stage === 1) startStage1();
            if (stage === 2) startStage2();
            if (stage === 3) startStage3();
            if (stage === 4) startStage4();
            if (stage === 6) startStage6();
        }

        // --- ЭТАП 1: АИМ (Хардкор) ---
        let targetsHit = 0;
        function startStage1() {
            ui.areas[1].style.display = 'block';
            targetsHit = 0;
            
            ui.areas[1].onclick = (e) => {
                if (e.target === ui.areas[1]) triggerFail(); // Промах = сразу смерть
            };
            spawnTarget();
        }

        function spawnTarget() {
            if (targetsHit >= 12) return showPrep(2);
            ui.areas[1].innerHTML = '';
            
            const target = document.createElement('div');
            target.className = 'target';
            const maxX = ui.areas[1].clientWidth - 40;
            const maxY = ui.areas[1].clientHeight - 40;
            target.style.left = Math.floor(Math.random() * maxX) + 'px';
            target.style.top = Math.floor(Math.random() * maxY) + 'px';
            
            target.onpointerdown = (e) => {
                e.stopPropagation();
                targetsHit++;
                tg.HapticFeedback.impactOccurred('light');
                spawnTarget();
            };
            ui.areas[1].appendChild(target);
        }

        // --- ЭТАП 2: ПАМЯТЬ (4x4, 5 блоков, 1 сек) ---
        let memorySeq = [], playerSeq = [];
        function startStage2() {
            ui.areas[2].style.display = 'block';
            const grid = document.getElementById('grid-container');
            grid.innerHTML = '';
            memorySeq = []; playerSeq = [];
            
            for (let i = 0; i < 16; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                cell.dataset.index = i;
                grid.appendChild(cell);
            }

            while (memorySeq.length < 5) {
                let r = Math.floor(Math.random() * 16);
                if (!memorySeq.includes(r)) memorySeq.push(r);
            }

            setTimeout(() => {
                const cells = document.querySelectorAll('.grid-cell');
                memorySeq.forEach(idx => cells[idx].classList.add('active'));
                tg.HapticFeedback.impactOccurred('medium');
                
                setTimeout(() => {
                    cells.forEach(c => c.classList.remove('active'));
                    enableGridClicks(cells);
                }, 1000); // Всего 1 секунда на запоминание!
            }, 500);
        }

        function enableGridClicks(cells) {
            cells.forEach(cell => {
                cell.onpointerdown = () => {
                    const idx = parseInt(cell.dataset.index);
                    if (playerSeq.includes(idx)) return;
                    
                    if (memorySeq.includes(idx)) {
                        cell.classList.add('active');
                        playerSeq.push(idx);
                        tg.HapticFeedback.impactOccurred('light');
                        if (playerSeq.length === 5) setTimeout(() => showPrep(3), 300);
                    } else {
                        cell.classList.add('error');
                        triggerFail();
                    }
                };
            });
        }

        // --- ЭТАП 3: ДЕШИФРАТОР (Коллизии + 12 цифр) ---
        let currentNum = 1;
        function startStage3() {
            ui.areas[3].style.display = 'block';
            ui.areas[3].innerHTML = '';
            currentNum = 1;
            
            const positions = [];
            const size = 50; // радиус проверки
            const maxX = ui.areas[3].clientWidth - 50;
            const maxY = ui.areas[3].clientHeight - 50;

            for (let i = 1; i <= 12; i++) {
                let x, y, overlap;
                let attempts = 0;
                // Защита от слипания (коллизии)
                do {
                    overlap = false;
                    x = Math.random() * maxX;
                    y = Math.random() * maxY;
                    for (let pos of positions) {
                        if (Math.hypot(pos.x - x, pos.y - y) < size) {
                            overlap = true; break;
                        }
                    }
                    attempts++;
                } while (overlap && attempts < 200);
                
                positions.push({x, y});

                const btn = document.createElement('div');
                btn.className = 'number-btn';
                btn.innerText = i;
                btn.style.left = x + 'px';
                btn.style.top = y + 'px';
                
                btn.onpointerdown = () => {
                    if (i === currentNum) {
                        btn.style.background = "var(--gold)";
                        btn.style.color = "#000";
                        tg.HapticFeedback.impactOccurred('light');
                        currentNum++;
                        setTimeout(() => btn.style.display = 'none', 100);
                        if (currentNum > 12) showPrep(4);
                    } else {
                        triggerFail();
                    }
                };
                ui.areas[3].appendChild(btn);
            }
        }

        // --- ЭТАП 4: ТАЙМИНГ (Хардкор скорость) ---
        let cursorInt, cursorPos = 0, cursorDir = 1;
        function startStage4() {
            ui.areas[4].style.display = 'block';
            ui.actionBtn.classList.remove('hidden');
            cursorPos = 0; cursorDir = 1;
            
            cursorInt = setInterval(() => {
                cursorPos += 3.5 * cursorDir; // Очень быстро
                if (cursorPos >= 100 || cursorPos <= 0) cursorDir *= -1;
                document.getElementById('cursor').style.left = cursorPos + '%';
            }, 16);

            ui.actionBtn.onclick = () => {
                clearInterval(cursorInt);
                // Зона от 75% до 85% (ширина 10%)
                if (cursorPos >= 75 && cursorPos <= 85) {
                    ui.actionBtn.classList.add('hidden');
                    tg.HapticFeedback.notificationOccurred('success');
                    setTimeout(() => showPrep(6), 500);
                } else {
                    triggerFail();
                }
            };
        }

        // --- ЭТАП 6: КОНТРОЛЬ (Удержание + Тревога) ---
        let holdTimer, isHolding = false, isAlarm = false, progress = 0;
        function startStage6() {
            ui.areas[6].style.display = 'block';
            document.getElementById('progress-bar').style.display = 'block';
            const fill = document.getElementById('progress-fill');
            const zone = document.getElementById('hold-zone');
            
            fill.style.width = '0%';
            progress = 0; isHolding = false; isAlarm = false;
            
            zone.onpointerdown = (e) => { e.preventDefault(); isHolding = true; zone.style.transform = 'scale(0.9)'; };
            document.onpointerup = () => { isHolding = false; zone.style.transform = 'scale(1)'; };

            // Логика тревоги
            function scheduleAlarm() {
                if (progress >= 100) return;
                const delay = 2000 + Math.random() * 4000;
                setTimeout(() => {
                    if (progress >= 100) return;
                    isAlarm = true;
                    document.body.classList.add('warning-mode');
                    zone.classList.add('warning-zone');
                    zone.innerText = "ОТПУСТИ!";
                    tg.HapticFeedback.notificationOccurred('warning');
                    
                    // Время тревоги от 0.5 до 1 секунды (очень мало времени на реакцию!)
                    setTimeout(() => {
                        isAlarm = false;
                        document.body.classList.remove('warning-mode');
                        zone.classList.remove('warning-zone');
                        zone.innerText = "ДЕРЖИ";
                        scheduleAlarm();
                    }, 500 + Math.random() * 500);
                }, delay);
            }
            scheduleAlarm();

            // Игровой цикл
            holdTimer = setInterval(() => {
                if (isHolding && isAlarm) {
                    // Держал во время тревоги - смерть
                    clearInterval(holdTimer);
                    document.body.classList.remove('warning-mode');
                    document.onpointerup = null;
                    triggerFail();
                    return;
                }

                if (isHolding && !isAlarm) {
                    progress += 0.5; // Долго копить (нужно около 20 сек чистого времени)
                    fill.style.width = progress + '%';
                    if (progress >= 100) {
                        clearInterval(holdTimer);
                        document.onpointerup = null;
                        winGame();
                    }
                } else if (!isHolding && !isAlarm && progress > 0) {
                    progress -= 0.2; // Штраф за простой
                    fill.style.width = progress + '%';
                }
            }, 100);
        }

        // --- ПОБЕДА ---
        function winGame() {
            ui.areas[6].style.display = 'none';
            ui.title.innerText = "СИСТЕМА ВЗЛОМАНА";
            ui.title.style.color = "var(--gold)";
            ui.info.innerHTML = "Ты прошел ад. Твой код на 1500G:<br><br><strong style='font-size:24px; background:#111; padding:10px; border-radius:5px; border:1px solid var(--gold); user-select:all;'>STAND-COSMIC-1500</strong><br><br>Сделай скриншот или скопируй текст!";
            tg.HapticFeedback.notificationOccurred('success');
            
            // Если бот настроен на прием данных с WebApp (кнопка KeyboardButton)
            // tg.sendData('win_777_secret'); 
        }
    </script>
</body>
</html>
